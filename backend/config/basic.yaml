# basic
# 服务器配置
server:
  host: 192.168.5.180 # 服务主机
  port: 8080 # 服务端口
  mode: debug # 运行模式: debug/release/test
  read_timeout: 30s # 读取超时
  write_timeout: 30s # 写入超时
  max_header_bytes: 1048576 # 最大请求头大小 (1MB)
# 前端
frontend:
  protocol: http # 协议: http/https
  host: 192.168.5.180
  port: 3000
# API配置
api:
  protocol: http # 协议: http/https
  host: 192.168.5.180 # API主机
  port: 8080 # API端口
  version: v1 # API版本
  prefix: /api # API路径前缀

# JWT配置
jwt:
  secret: "your-super-secret-jwt-key-change-in-production" # JWT密钥
  expire: 24h # 访问令牌过期时间
  refresh_expire: 168h # 刷新令牌过期时间 (7天)
  issuer: "tiny-forum" # 签发者

# 日志配置
log:
  level: info # 日志级别: debug/info/warn/error
  filename: ./logs/app.log # 日志文件路径
  max_size: 100 # 单个日志文件最大大小(MB)
  max_backups: 10 # 保留的旧日志文件最大数量
  max_age: 30 # 保留日志文件的最大天数
  compress: true # 是否压缩旧日志文件
  console: true # 是否输出到控制台
  json_format: false # 是否使用JSON格式
  db:
    dsn: ./logs/log.db
    max_buffer: 1024 # 最大缓冲区大小 (KB)
    batch_size: 100 # 批量写入大小
    flush_every: 5s # 每隔多久刷新一次日志
    retention: 7 # 日志保留时间 (天)

# 限流配置
rate_limit:
  enabled: true # 是否启用
  requests: 100 # 请求次数
  duration: 60 # 时间窗口(秒)
  burst: 50 # 突发请求数

ollama:
  base_url: http://localhost:11434
  model: qwen3:0.6b
  num_predict: 256 # 限制生成的最大 token 数量
  temperature: 0.7 # 适当降低随机性
  timeout: 60 # 超时时间(秒)

allow_origins:
  - http://localhost:3000
  - http://127.0.0.1:3000
  - http://192.168.5.243:8080
  - http://192.168.5.180:3000

# 上传配置
upload:
  max_size: 10485760 # 10MB，默认
  allowed_types:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp
    - .pdf
    - .zip
  avatar:
    max_size: 2097152 # 2MB
    allowed_types:
      - .jpg
      - .jpeg
      - .png
      - .webp
    width: 512
    height: 512
  post_image:
    max_size: 5242880 # 5MB
    allowed_types:
      - .jpg
      - .jpeg
      - .png
      - .gif
      - .webp
  storage:
    type: local # local, oss, cos
    local_path: ./uploads
    url_prefix: /uploads/
