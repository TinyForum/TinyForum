
# basic
version: 1.0.0 # 配置版本
server:
  host: localhost
  port: 8080
  mode: debug
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576

frontend:
  protocol: http
  host: localhost
  port: 3000

api:
  protocol: http
  host: localhost
  port: 8080
  version: v1
  prefix: /api

log:
  level: info
  filename: ./logs/app.log
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true
  console: true
  json_format: false
  db:
    dsn: ./logs/log.db
    max_buffer: 1024
    batch_size: 100
    flush_every: 5s
    retention: 7

ollama:
  base_url: http://localhost:11434
  model: qwen3:0.6b
  num_predict: 256
  temperature: 0.7
  timeout: 60

llamacpp:
  base_url: http://localhost:8080
  model: llama.cpp
  num_predict: 256
  temperature: 0.7
  timeout: 60

allow_origins:
  - "http://localhost:3000"
  - "http://127.0.0.1:3000"
  - "http://localhost:8080"
  - "http://127.0.0.1:8080"

upload:
  upload_dir: uploads
  url_prefix: /upload
  allowed_ext: png,jpg,jpeg,gif,mp4,webm,mp3,avi,mkv
  max_size: 10485760
  allowed_types:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp
    - .pdf
    - .zip
  avatar:
    max_size: 2097152
    allowed_types: [.jpg, .jpeg, .png, .webp]
    width: 512
    height: 512
  post_image:
    max_size: 5242880
    allowed_types: [.jpg, .jpeg, .png, .gif, .webp]
  storage:
    type: local
    local_path: ./uploads
    # url_prefix: /uploads/

