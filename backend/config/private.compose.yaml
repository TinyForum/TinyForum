# 邮件配置
email:
  host: smtp.gmail.com # SMTP服务器地址
  port: 587 # SMTP服务器端口
  username: noreply@example.com # 邮箱账号
  password: your-email-password # 邮箱密码/授权码
  from: noreply@example.com # 发件人邮箱
  from_name: Tiny Forum # 发件人名称
  ssl: false # 是否使用SSL
  tls: true # 是否使用TLS
  pool_size: 5 # 连接池大小

# JWT配置
jwt:
  secret: "tiny-forum-secret-change-in-production-32chars" # JWT密钥
  expire: 24h # 访问令牌过期时间
  refresh_expire: 168h # 刷新令牌过期时间 (7天)
  issuer: "tiny-forum" # 签发者

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  dbname: tiny_forum
  sslmode: disable
  timezone: Asia/Shanghai

server:
  port: 8080
  mode: debug

redis:
  host: redis
  port: 6379
  password: ""
  db: 0

admin:
  email: admin@test.com
  password: password
  username: admin
  role: super_admin
  score: 10000
