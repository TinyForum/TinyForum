basePath: /api/v1
definitions:
  answer.CreateAnswerRequest:
    properties:
      content:
        description: 回答内容
        maxLength: 5000
        minLength: 1
        type: string
    required:
    - content
    type: object
  auth.DeleteAccountInput:
    properties:
      confirm:
        type: string
      password:
        type: string
    type: object
  board.CreateBoardInput:
    properties:
      cover:
        maxLength: 500
        type: string
      description:
        maxLength: 500
        type: string
      icon:
        maxLength: 100
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      parent_id:
        type: integer
      post_role:
        type: string
      reply_role:
        type: string
      slug:
        maxLength: 50
        minLength: 2
        type: string
      sort_order:
        type: integer
      view_role:
        type: string
    required:
    - name
    - slug
    type: object
  board.ReviewApplicationRequest:
    properties:
      approve:
        type: boolean
      can_ban_user:
        type: boolean
      can_delete_post:
        type: boolean
      can_edit_any_post:
        type: boolean
      can_manage_moderator:
        type: boolean
      can_pin_post:
        type: boolean
      review_note:
        maxLength: 500
        type: string
    required:
    - approve
    type: object
  comment.CreateCommentInput:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
      parent_id:
        type: integer
      post_id:
        type: integer
    required:
    - content
    - post_id
    type: object
  common.BasicResponse:
    properties:
      code:
        description: 业务状态码
        type: integer
      data:
        description: 业务数据
      message:
        description: 业务信息
        type: string
      request_id:
        description: 请求ID
        type: string
      timestamp:
        description: 时间戳
        type: integer
      trace_id:
        description: 追踪ID
        type: string
    type: object
  do.AnnouncementStatus:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      AnnouncementStatusArchived: 已归档
      AnnouncementStatusDraft: 草稿
      AnnouncementStatusPublished: 已发布
    x-enum-descriptions:
    - 草稿
    - 已发布
    - 已归档
    x-enum-varnames:
    - AnnouncementStatusDraft
    - AnnouncementStatusPublished
    - AnnouncementStatusArchived
  do.AnnouncementType:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-comments:
      AnnouncementTypeEmergency: 紧急公告
      AnnouncementTypeEvent: 活动公告
      AnnouncementTypeImportant: 重要公告
      AnnouncementTypeNormal: 普通公告
    x-enum-descriptions:
    - 普通公告
    - 重要公告
    - 紧急公告
    - 活动公告
    x-enum-varnames:
    - AnnouncementTypeNormal
    - AnnouncementTypeImportant
    - AnnouncementTypeEmergency
    - AnnouncementTypeEvent
  do.ApplyModeratorInput:
    properties:
      reason:
        maxLength: 500
        type: string
      req_ban_user:
        type: boolean
      req_delete_post:
        type: boolean
      req_edit_any_post:
        type: boolean
      req_manage_moderator:
        type: boolean
      req_pin_post:
        type: boolean
    required:
    - reason
    type: object
  do.PostStatus:
    enum:
    - draft
    - pending
    - published
    - hidden
    type: string
    x-enum-varnames:
    - PostStatusDraft
    - PostStatusPending
    - PostStatusPublished
    - PostStatusHidden
  do.UpdateProfileInput:
    properties:
      avatar:
        type: string
      bio:
        maxLength: 500
        type: string
      email:
        description: 邮箱
        type: string
      username:
        description: 用户名
        type: string
    type: object
  dto.BatchMarkReadRequest:
    properties:
      ids:
        description: 通知ID列表，为空则标记所有
        items:
          type: integer
        type: array
    type: object
  dto.CreateQuestionRequest:
    properties:
      board_id:
        type: integer
      content:
        type: string
      cover:
        type: string
      reward_score:
        maximum: 100
        minimum: 0
        type: integer
      status:
        $ref: '#/definitions/do.PostStatus'
      summary:
        maxLength: 500
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        maxLength: 100
        type: string
    required:
    - content
    - title
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        description: 邮箱
        type: string
    required:
    - email
    type: object
  dto.LeaderboardUserDetail:
    properties:
      avatar:
        type: string
      email:
        type: string
      id:
        type: integer
      rank:
        type: integer
      role:
        type: string
      score:
        type: integer
      username:
        type: string
    type: object
  dto.ResetPasswordWithTokenRequest:
    properties:
      password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  post.CreatePostInput:
    properties:
      board_id:
        type: integer
      content:
        minLength: 10
        type: string
      cover:
        type: string
      status:
        $ref: '#/definitions/do.PostStatus'
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        maxLength: 200
        minLength: 2
        type: string
      type:
        type: string
    required:
    - board_id
    - content
    - title
    type: object
  post.UpdatePostInput:
    properties:
      content:
        minLength: 10
        type: string
      cover:
        type: string
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        maxLength: 200
        minLength: 2
        type: string
    type: object
  request.CreateAnnouncement:
    properties:
      board_id:
        type: integer
      content:
        type: string
      cover:
        type: string
      expired_at:
        type: string
      is_global:
        type: boolean
      is_pinned:
        type: boolean
      published_at:
        type: string
      status:
        $ref: '#/definitions/do.AnnouncementStatus'
      summary:
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
      type:
        allOf:
        - $ref: '#/definitions/do.AnnouncementType'
        enum:
        - 0
        - 1
        - 2
        - 3
    required:
    - content
    - title
    - type
    type: object
  request.ListAnnouncements:
    properties:
      board_id:
        type: integer
      end_time:
        type: string
      is_global:
        type: boolean
      is_pinned:
        type: boolean
      keyword:
        type: string
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      start_time:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/do.AnnouncementStatus'
        enum:
        - 0
        - 1
        - 2
      type:
        allOf:
        - $ref: '#/definitions/do.AnnouncementType'
        enum:
        - 0
        - 1
        - 2
        - 3
    type: object
  request.SetUserRoleRequest:
    properties:
      role:
        enum:
        - user
        - member
        - moderator
        - reviewer
        - bot
        - admin
        - super_admin
        - system_maintainer
        type: string
    required:
    - role
    type: object
  request.UpdateAnnouncement:
    properties:
      board_id:
        type: integer
      content:
        type: string
      cover:
        type: string
      expired_at:
        type: string
      is_global:
        type: boolean
      is_pinned:
        type: boolean
      published_at:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/do.AnnouncementStatus'
        enum:
        - 0
        - 1
        - 2
      summary:
        type: string
      title:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/do.AnnouncementType'
        enum:
        - 0
        - 1
        - 2
        - 3
    type: object
  risk.resolveTaskInput:
    properties:
      note:
        maxLength: 500
        type: string
    type: object
  tag.CreateTagInput:
    properties:
      color:
        type: string
      description:
        type: string
      name:
        maxLength: 50
        minLength: 1
        type: string
    required:
    - name
    type: object
  topic.AddPostToTopicRequest:
    properties:
      post_id:
        description: 帖子ID
        example: 123
        type: integer
      sort_order:
        description: 排序顺序
        example: 0
        type: integer
    required:
    - post_id
    type: object
  topic.CreateTopicInput:
    properties:
      cover:
        maxLength: 500
        type: string
      description:
        maxLength: 500
        type: string
      is_public:
        type: boolean
      title:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - title
    type: object
  user.AdminSetScoreRequest:
    properties:
      operation:
        enum:
        - set
        - add
        - subtract
        type: string
      reason:
        maxLength: 200
        type: string
      score:
        maximum: 999999
        minimum: 0
        type: integer
    required:
    - operation
    - reason
    - score
    type: object
  user.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  user.RegisterInput:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - email
    - password
    - username
    type: object
  vo.SimpleLeaderboardItem:
    properties:
      id:
        type: integer
      rank:
        type: integer
      score:
        type: integer
      username:
        type: string
    type: object
  vo.UserStatsInfo:
    properties:
      total_answer:
        description: 总回答数
        type: integer
      total_comment:
        description: 总评论数
        type: integer
      total_favorites:
        description: |-
          TotalBoard   int64 `json:"total_board"`   // 总板块数
          TotalTag     int64 `json:"total_tag"`     // 总标签数
        type: integer
      total_follower:
        description: 总关注数
        type: integer
      total_following:
        description: 总粉丝数
        type: integer
      total_like:
        description: 总点赞数
        type: integer
      total_post:
        description: 总帖子数
        type: integer
      total_question:
        description: 总问题数
        type: integer
      total_report:
        description: 总举报数
        type: integer
      total_score:
        description: 总积分
        type: integer
      total_upload:
        description: 总上传数
        type: integer
      total_violation:
        description: 总违规数
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: 一个基于 Gin 的论坛系统 API
  title: Tiny Forum API
  version: "1.0"
paths:
  /admin/announcements:
    post:
      consumes:
      - application/json
      description: 管理员创建一条新公告，需要认证及管理员权限
      parameters:
      - description: 公告信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.CreateAnnouncement'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限（非管理员）
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 创建公告
      tags:
      - 公告管理
  /admin/announcements/{id}:
    delete:
      consumes:
      - application/json
      description: 管理员根据ID删除公告，需要认证及管理员权限
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 参数错误（无效的公告ID）
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限（非管理员）
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "404":
          description: 公告不存在
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 删除公告
      tags:
      - 公告管理
    put:
      consumes:
      - application/json
      description: 更新公告信息
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      - description: 公告信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.UpdateAnnouncement'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "404":
          description: 公告不存在
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 更新公告
      tags:
      - 公告管理
  /admin/announcements/{id}/archive:
    post:
      consumes:
      - application/json
      description: 将公告状态设为已归档
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 归档成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "404":
          description: 公告不存在
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 归档公告
      tags:
      - 公告管理
  /admin/announcements/{id}/pin:
    put:
      consumes:
      - application/json
      description: 设置公告的置顶状态
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      - description: 置顶状态
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "404":
          description: 公告不存在
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 置顶/取消置顶公告
      tags:
      - 公告管理
  /admin/announcements/{id}/publish:
    post:
      consumes:
      - application/json
      description: 将公告状态设为已发布
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 发布成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 参数错误或发布时间无效
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "404":
          description: 公告不存在
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 发布公告
      tags:
      - 公告管理
  /admin/announcements/list:
    get:
      consumes:
      - application/json
      description: 管理员列出所有公告，需要认证及管理员权限
      parameters:
      - description: 公告信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.ListAnnouncements'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限（非管理员）
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 列出公告
      tags:
      - 公告管理
  /admin/audit/tasks/{id}/approve:
    put:
      consumes:
      - application/json
      description: 管理员审核通过指定帖子
      parameters:
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 审核通过成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 无效的帖子ID
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "404":
          description: 帖子不存在
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 审核通过帖子
      tags:
      - 帖子管理
  /admin/audit/tasks/{id}/reject:
    put:
      consumes:
      - application/json
      description: 管理员审核拒绝指定帖子
      parameters:
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      - description: 拒绝原因
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 审核拒绝成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 无效的帖子ID
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "404":
          description: 帖子不存在
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 审核拒绝帖子
      tags:
      - 帖子管理
  /admin/boards/applications:
    get:
      description: 管理员分页查询版主申请列表，可按板块和状态筛选
      parameters:
      - description: 板块ID
        in: query
        name: board_id
        type: integer
      - description: 申请状态
        enum:
        - pending
        - approved
        - rejected
        in: query
        name: status
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "400":
          description: 无效的板块ID
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "403":
          description: 无权限（需要管理员权限）
          schema:
            $ref: '#/definitions/common.BasicResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BasicResponse'
      security:
      - ApiKeyAuth: []
      summary: 获取版主申请列表
      tags:
      - 版主管理
