host: localhost:8080
info:
  contact: {}
  description: 一个基于 Gin 的论坛系统 API
  title: Tiny Forum API
  version: "1.0"
paths:
  /admin/announcements:
    post:
      consumes:
      - application/json
      parameters:
      - description: 创建公告请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.CreateAnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Announcement'
              type: object
      summary: 创建公告
      tags:
      - 公告管理
  /admin/announcements/{id}:
    delete:
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 删除公告
      tags:
      - 公告管理
    put:
      consumes:
      - application/json
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新公告请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UpdateAnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 更新公告
      tags:
      - 公告管理
  /admin/announcements/{id}/archive:
    post:
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 归档公告
      tags:
      - 公告管理
  /admin/announcements/{id}/pin:
    put:
      consumes:
      - application/json
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      - description: 置顶状态
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 置顶/取消置顶公告
      tags:
      - 公告管理
  /admin/announcements/{id}/publish:
    post:
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 发布公告
      tags:
      - 公告管理
  /admin/posts:
    get:
      description: 管理员分页获取所有帖子列表，支持关键词搜索
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.Post'
                        type: array
                    type: object
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理员获取帖子列表
      tags:
      - 管理接口
  /admin/posts/{id}/pin:
    put:
      description: 管理员切换指定帖子的置顶状态
      parameters:
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 无效的帖子ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 切换帖子置顶状态
      tags:
      - 管理接口
  /admin/statistics/day:
    get:
      consumes:
      - application/json
      description: 获取指定日期的统计数据（用户、帖子、评论等）
      parameters:
      - default: 今天
        description: '日期 (格式: 2006-01-02)'
        in: query
        name: date
        type: string
      - default: all
        description: 统计类型
        enum:
        - users
        - posts
        - comments
        - likes
        - all
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.StatsTodayInfo'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取日统计数据
      tags:
      - 统计管理
  /admin/statistics/total:
    get:
      consumes:
      - application/json
      description: 获取指定时间范围内的总计统计数据（支持用户、帖子、评论等类型）
      parameters:
      - default: 30天前
        description: '开始日期 (格式: 2006-01-02)'
        in: query
        name: start_date
        type: string
      - default: 今天
        description: '结束日期 (格式: 2006-01-02)'
        in: query
        name: end_date
        type: string
      - default: all
        description: 统计类型
        enum:
        - users
        - posts
        - comments
        - likes
        - all
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.StatsTotalResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取总计统计数据
      tags:
      - 统计管理
  /admin/statistics/trend:
    get:
      consumes:
      - application/json
      description: 获取指定时间范围内的趋势数据（按天、周、月统计）
      parameters:
      - default: 7天前
        description: '开始日期 (格式: 2006-01-02)'
        in: query
        name: start_date
        type: string
      - default: 今天
        description: '结束日期 (格式: 2006-01-02)'
        in: query
        name: end_date
        type: string
      - description: 统计类型
        enum:
        - users
        - posts
        - comments
        - likes
        in: query
        name: type
        required: true
        type: string
      - default: day
        description: 统计粒度
        enum:
        - day
        - week
        - month
        in: query
        name: interval
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.StatsTrendResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取趋势统计数据
      tags:
      - 统计管理
  /admin/users:
    get:
      produces:
      - application/json
      responses: {}
      security:
      - ApiKeyAuth: []
      summary: 管理员获取用户列表
      tags:
      - 管理接口
  /admin/users/{id}/active:
    put:
      consumes:
      - application/json
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - ApiKeyAuth: []
      summary: 管理员设置用户状态
      tags:
      - 管理接口
  /admin/users/{id}/blocked:
    put:
      consumes:
      - application/json
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - ApiKeyAuth: []
      summary: 管理员封禁/解封用户
      tags:
      - 管理接口
  /admin/users/{id}/role:
    put:
      consumes:
      - application/json
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 角色信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.SetUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理员设置用户角色
      tags:
      - 管理接口
  /announcements:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 板块ID
        in: query
        name: board_id
        type: integer
      - description: 公告类型
        enum:
        - normal
        - important
        - emergency
        - event
        in: query
        name: type
        type: string
      - description: 状态
        enum:
        - draft
        - published
        - archived
        in: query
        name: status
        type: string
      - description: 是否置顶
        in: query
        name: is_pinned
        type: boolean
      - description: 是否全局
        in: query
        name: is_global
        type: boolean
      - description: 关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.ListAnnouncementResponse'
              type: object
      summary: 获取公告列表
      tags:
      - 公告管理
  /announcements/{id}:
    get:
      parameters:
      - description: 公告ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Announcement'
              type: object
      summary: 获取公告详情
      tags:
      - 公告管理
  /announcements/pinned:
    get:
      parameters:
      - description: 板块ID
        in: query
        name: board_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Announcement'
                  type: array
              type: object
      summary: 获取置顶公告
      tags:
      - 公告管理
  /answers/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定的回答（作者本人、问题作者、版主或管理员可操作）
      parameters:
      - description: 回答ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 回答不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 删除回答
      tags:
      - 问答管理
    get:
      consumes:
      - application/json
      description: 根据ID获取回答的详细信息
      parameters:
      - description: 回答ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Comment'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 回答不存在
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取回答详情
      tags:
      - 问答管理
  /answers/{id}/answer:
    post:
      consumes:
