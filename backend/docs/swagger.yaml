basePath: /api/v1
definitions:
  answer.CreateAnswerRequest:
    properties:
      content:
        description: 回答内容
        maxLength: 5000
        minLength: 1
        type: string
    required:
    - content
    type: object
  answer.VoteStatusResponse:
    properties:
      down_count:
        description: 反对数
        type: integer
      up_count:
        description: 赞同数
        type: integer
      user_vote:
        description: 0:未投票, 1:赞同, -1:反对
        type: integer
    type: object
  auth.DeleteAccountInput:
    properties:
      confirm:
        type: string
      password:
        type: string
    type: object
  board.CreateBoardInput:
    properties:
      cover:
        maxLength: 500
        type: string
      description:
        maxLength: 500
        type: string
      icon:
        maxLength: 100
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      parent_id:
        type: integer
      post_role:
        type: string
      reply_role:
        type: string
      slug:
        maxLength: 50
        minLength: 2
        type: string
      sort_order:
        type: integer
      view_role:
        type: string
    required:
    - name
    - slug
    type: object
  board.ModeratorBoardWithPerms:
    properties:
      cover:
        type: string
      created_at:
        type: string
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
