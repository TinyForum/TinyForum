      post_role:
        $ref: '#/definitions/model.UserRole'
      reply_role:
        $ref: '#/definitions/model.UserRole'
      slug:
        type: string
      sort_order:
        type: integer
      thread_count:
        type: integer
      today_count:
        type: integer
      updated_at:
        type: string
      view_role:
        $ref: '#/definitions/model.UserRole'
    type: object
  board.ReviewApplicationRequest:
    properties:
      approve:
        type: boolean
      can_ban_user:
        type: boolean
      can_delete_post:
        type: boolean
      can_edit_any_post:
        type: boolean
      can_manage_moderator:
        type: boolean
      can_pin_post:
        type: boolean
      review_note:
        maxLength: 500
        type: string
    required:
