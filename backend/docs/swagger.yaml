basePath: /api/v1
definitions:
  handler.AddModeratorRequest:
    properties:
      can_ban_user:
        example: true
        type: boolean
      can_delete_post:
        example: true
        type: boolean
      can_edit_any_post:
        example: false
        type: boolean
      can_manage_moderator:
        example: false
        type: boolean
      can_pin_post:
        example: true
        type: boolean
      user_id:
        example: 1
        type: integer
    required:
    - user_id
    type: object
  handler.AddPostToTopicRequest:
    properties:
      post_id:
        description: 帖子ID
        example: 123
        type: integer
      sort_order:
        description: 排序顺序
        example: 0
        type: integer
    required:
    - post_id
    type: object
  handler.BanUserRequest:
    properties:
      expires_at:
        example: "2024-12-31T23:59:59Z"
        type: string
      reason:
        example: 发布违规内容
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - reason
    - user_id
    type: object
  handler.SetUserActiveRequest:
    properties:
      active:
        description: 用户状态：true-启用，false-禁用
        example: true
        type: boolean
    type: object
  handler.SetUserRoleRequest:
    properties:
      role:
        description: 用户角色
        enum:
        - user
        - moderator
        - admin
        example: moderator
        type: string
    required:
    - role
    type: object
  handler.VoteAnswerRequest:
    properties:
      vote_type:
        description: 投票类型：up-赞同，down-反对
        enum:
        - up
        - down
        example: up
        type: string
    required:
    - vote_type
    type: object
  model.ActionType:
    enum:
    - create_post
    - create_comment
    - like_post
    - like_comment
    - follow_user
    - accept_answer
    - sign_in
    type: string
    x-enum-varnames:
    - ActionCreatePost
    - ActionCreateComment
    - ActionLikePost
    - ActionLikeComment
    - ActionFollowUser
    - ActionAcceptAnswer
    - ActionSignIn
  model.Board:
    properties:
      cover:
        type: string
      created_at:
        type: string
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      post_count:
        type: integer
      post_role:
        $ref: '#/definitions/model.UserRole'
      reply_role:
        $ref: '#/definitions/model.UserRole'
      slug:
        type: string
      sort_order:
        type: integer
      thread_count:
        type: integer
      today_count:
        type: integer
      updated_at:
        type: string
      view_role:
        $ref: '#/definitions/model.UserRole'
    type: object
  model.BoardTree:
    properties:
      children:
        items:
          $ref: '#/definitions/model.BoardTree'
        type: array
      cover:
        type: string
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      post_count:
        type: integer
      post_role:
        $ref: '#/definitions/model.UserRole'
      reply_role:
        $ref: '#/definitions/model.UserRole'
      slug:
        type: string
      sort_order:
        type: integer
      thread_count:
        type: integer
      today_count:
        type: integer
      view_role:
        $ref: '#/definitions/model.UserRole'
    type: object
  model.Comment:
    properties:
      author:
        $ref: '#/definitions/model.User'
      author_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_accepted:
        description: 新增
        type: boolean
      is_answer:
        description: 新增
        type: boolean
      like_count:
        type: integer
      parent:
        $ref: '#/definitions/model.Comment'
      parent_id:
        type: integer
      post_id:
        type: integer
      replies:
        items:
          $ref: '#/definitions/model.Comment'
        type: array
      updated_at:
        type: string
      vote_count:
        description: 新增
        type: integer
    type: object
  model.Moderator:
    properties:
      board:
        $ref: '#/definitions/model.Board'
      board_id:
        type: integer
      can_ban_user:
        type: boolean
      can_delete_post:
        type: boolean
      can_edit_any_post:
        type: boolean
      can_manage_moderator:
        type: boolean
      can_pin_post:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      permissions:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.User'
      user_id:
        type: integer
    type: object
  model.Notification:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_read:
        type: boolean
      sender:
        $ref: '#/definitions/model.User'
      sender_id:
        type: integer
      target_id:
        type: integer
      target_type:
        type: string
      type:
        $ref: '#/definitions/model.NotificationType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  model.NotificationType:
    enum:
    - comment
    - like
    - follow
    - reply
    - system
    type: string
    x-enum-varnames:
    - NotifyComment
    - NotifyLike
    - NotifyFollow
    - NotifyReply
    - NotifySystem
  model.Post:
    properties:
      author:
        $ref: '#/definitions/model.User'
      author_id:
        type: integer
      board:
        allOf:
        - $ref: '#/definitions/model.Board'
        description: 新增
      board_id:
        description: 新增
        type: integer
      content:
        type: string
      cover:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_question:
        description: 新增：标记是否为问答帖
        type: boolean
      like_count:
        type: integer
      pin_in_board:
        description: 新增
        type: boolean
      pin_top:
        type: boolean
      question:
        allOf:
        - $ref: '#/definitions/model.Question'
        description: 新增
      status:
        $ref: '#/definitions/model.PostStatus'
      summary:
        type: string
      tags:
        items:
          $ref: '#/definitions/model.Tag'
        type: array
      title:
        type: string
      type:
        $ref: '#/definitions/model.PostType'
      updated_at:
        type: string
      view_count:
        type: integer
    type: object
  model.PostStatus:
    enum:
    - draft
    - published
    - hidden
    type: string
    x-enum-varnames:
    - PostStatusDraft
    - PostStatusPublished
    - PostStatusHidden
  model.PostType:
    enum:
    - post
    - article
    - topic
    type: string
    x-enum-varnames:
    - PostTypePost
    - PostTypeArticle
    - PostTypeTopic
  model.Question:
    properties:
      accepted_answer:
        $ref: '#/definitions/model.Comment'
      accepted_answer_id:
        type: integer
      answer_count:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      post:
        $ref: '#/definitions/model.Post'
      post_id:
        type: integer
      reward_score:
        type: integer
      updated_at:
        type: string
    type: object
  model.Tag:
    properties:
      color:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      post_count:
        type: integer
      updated_at:
        type: string
    type: object
  model.TimelineEvent:
    properties:
      action:
        $ref: '#/definitions/model.ActionType'
      actor:
        $ref: '#/definitions/model.User'
      actor_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      payload:
        type: string
      score:
        type: integer
      target_id:
        type: integer
      target_type:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.User'
      user_id:
        type: integer
    type: object
  model.Topic:
    properties:
      cover:
        type: string
      created_at:
        type: string
      creator:
        $ref: '#/definitions/model.User'
      creator_id:
        type: integer
      description:
        type: string
      follower_count:
        type: integer
      id:
        type: integer
      is_public:
        type: boolean
      post_count:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  model.User:
    properties:
      avatar:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        description: 激活，是否可以登录
        type: boolean
      is_blocked:
        description: 封禁，是否可以发言
        type: boolean
      last_login:
        type: string
      role:
        $ref: '#/definitions/model.UserRole'
      score:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
  model.UserRole:
    enum:
    - user
    - admin
    - moderator
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleAdmin
    - ModeratorUser
  response.PageData:
    properties:
      list: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.CreateBoardInput:
    properties:
      cover:
        maxLength: 500
        type: string
      description:
        maxLength: 500
        type: string
      icon:
        maxLength: 100
        type: string
      name:
        maxLength: 50
        minLength: 2
        type: string
      parent_id:
        type: integer
      post_role:
        type: string
      reply_role:
        type: string
      slug:
        maxLength: 50
        minLength: 2
        type: string
      sort_order:
        type: integer
      view_role:
        type: string
    required:
    - name
    - slug
    type: object
  service.CreateCommentInput:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
      parent_id:
        type: integer
      post_id:
        type: integer
    required:
    - content
    - post_id
    type: object
  service.CreatePostInput:
    properties:
      content:
        minLength: 10
        type: string
      cover:
        type: string
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        maxLength: 200
        minLength: 2
        type: string
      type:
        type: string
    required:
    - content
    - title
    type: object
  service.CreateTagInput:
    properties:
      color:
        type: string
      description:
        type: string
      name:
        maxLength: 50
        minLength: 1
        type: string
    required:
    - name
    type: object
  service.CreateTopicInput:
    properties:
      cover:
        maxLength: 500
        type: string
      description:
        maxLength: 500
        type: string
      is_public:
        type: boolean
      title:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - title
    type: object
  service.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  service.RegisterInput:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - email
    - password
    - username
    type: object
  service.UpdatePostInput:
    properties:
      content:
        minLength: 10
        type: string
      cover:
        type: string
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        maxLength: 200
        minLength: 2
        type: string
    type: object
  service.UpdateProfileInput:
    properties:
      avatar:
        type: string
      bio:
        maxLength: 500
        type: string
    type: object
  service.UserProfileResponse:
    properties:
      avatar:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      follower_count:
        type: integer
      following_count:
        type: integer
      id:
        type: integer
      is_active:
        description: 激活，是否可以登录
        type: boolean
      is_blocked:
        description: 封禁，是否可以发言
        type: boolean
      is_following:
        type: boolean
      last_login:
        type: string
      role:
        $ref: '#/definitions/model.UserRole'
      score:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 一个基于 Gin 的论坛系统 API
  title: Tiny Forum API
  version: "1.0"
paths:
  /admin/posts:
    get:
      description: 管理员分页获取所有帖子列表，支持关键词搜索
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.Post'
                        type: array
                    type: object
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理员获取帖子列表
      tags:
      - 管理接口
  /admin/posts/{id}/pin:
    put:
      description: 管理员切换指定帖子的置顶状态
      parameters:
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 无效的帖子ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 切换帖子置顶状态
      tags:
      - 管理接口
  /admin/users:
    get:
      description: 管理员分页获取所有用户列表，支持关键词搜索
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词（用户名、邮箱）
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.User'
                        type: array
                    type: object
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理员获取用户列表
      tags:
      - 管理接口
  /admin/users/{id}/active:
    put:
      consumes:
      - application/json
      description: 管理员启用或禁用指定用户账号
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 状态信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.SetUserActiveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 无效的用户ID或请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理员设置用户状态
      tags:
      - 管理接口
  /admin/users/{id}/role:
    put:
      consumes:
      - application/json
      description: 管理员设置指定用户的角色（user/moderator/admin）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 角色信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.SetUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 无效的用户ID或角色
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理员设置用户角色
      tags:
      - 管理接口
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户登录
      tags:
      - 验证管理
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - 验证管理
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.RegisterInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户注册
      tags:
      - 验证管理
  /boards:
    get:
      description: 分页获取板块列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.Board'
                        type: array
                    type: object
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取板块列表
      tags:
      - 板块管理
    post:
      consumes:
      - application/json
      description: 创建一个新的板块，需要管理员权限
      parameters:
      - description: 板块信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.CreateBoardInput'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Board'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 创建板块（仅管理员）
      tags:
      - 板块管理
  /boards/{id}:
    delete:
      description: 删除指定板块，需要管理员权限
      parameters:
      - description: 板块ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
