host: localhost:8080
info:
  contact: {}
  description: 一个基于 Gin 的论坛系统 API
  title: Tiny Forum API
  version: "1.0"
paths:
  /admin/boards/applications:
    get:
      description: 管理员分页查询版主申请列表，可按板块和状态筛选
      parameters:
      - description: 板块ID
        in: query
        name: board_id
        type: integer
      - description: 申请状态
        enum:
        - pending
        - approved
        - rejected
        in: query
        name: status
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          type: object
                        type: array
                    type: object
              type: object
        "400":
          description: 无效的板块ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限（需要管理员权限）
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取版主申请列表
      tags:
      - 版主管理
  /admin/boards/applications/{application_id}/review:
    post:
      consumes:
      - application/json
      description: 管理员审批用户的版主申请，通过时可设置版主权限，拒绝时需填写原因
      parameters:
      - description: 申请ID
        in: path
        name: application_id
        required: true
        type: integer
      - description: 审批信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/board.ReviewApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 审批完成
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 请求参数错误或申请ID无效
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限（需要管理员权限）
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 申请不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 审批版主申请
      tags:
      - 版主管理
  /admin/posts:
    get:
      description: 管理员分页获取所有帖子列表，支持关键词搜索
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.Post'
                        type: array
                    type: object
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理员获取帖子列表
      tags:
      - 管理接口
  /admin/posts/{id}/pin:
    put:
      description: 管理员切换指定帖子的置顶状态
      parameters:
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 无效的帖子ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 切换帖子置顶状态
      tags:
      - 管理接口
  /admin/posts/{id}/review:
    put:
      consumes:
      - application/json
      description: 管理员对指定帖子进行审核，可设置为 approved（通过）、rejected（拒绝）或 pending（待审）
      parameters:
      - description: 帖子ID
        in: path
        name: id
        required: true
        type: integer
      - description: 审核状态
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 审核成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 无权限（非管理员）
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 帖子不存在
          schema:
