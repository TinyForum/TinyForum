basePath: /api/v1
definitions:
  handler.AddModeratorRequest:
    properties:
      can_ban_user:
        example: true
        type: boolean
      can_delete_post:
        example: true
        type: boolean
      can_edit_any_post:
        example: false
        type: boolean
      can_manage_moderator:
        example: false
        type: boolean
      can_pin_post:
        example: true
        type: boolean
      user_id:
        example: 1
        type: integer
    required:
    - user_id
    type: object
  handler.AddPostToTopicRequest:
    properties:
      post_id:
        description: 帖子ID
        example: 123
        type: integer
      sort_order:
        description: 排序顺序
        example: 0
        type: integer
    required:
    - post_id
    type: object
  handler.BanUserRequest:
    properties:
      expires_at:
        example: "2024-12-31T23:59:59Z"
        type: string
      reason:
        example: 发布违规内容
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - reason
    - user_id
    type: object
  handler.CreateAnswerRequest:
    properties:
      content:
        description: 回答内容
        maxLength: 5000
        minLength: 1
        type: string
    required:
    - content
    type: object
  handler.SetUserRoleRequest:
    properties:
      role:
        description: 角色：user / member / moderator / reviewer / bot / admin / super_admin
        enum:
        - user
        - member
        - moderator
        - reviewer
        - bot
        - admin
        - super_admin
        type: string
    required:
    - role
    type: object
  model.ActionType:
    enum:
    - create_post
    - create_comment
    - like_post
    - like_comment
    - follow_user
    - accept_answer
    - sign_in
    type: string
    x-enum-varnames:
    - ActionCreatePost
    - ActionCreateComment
    - ActionLikePost
    - ActionLikeComment
    - ActionFollowUser
    - ActionAcceptAnswer
    - ActionSignIn
  model.Announcement:
    properties:
      board_id:
        description: 关联的板块ID（为空则全局）
        type: integer
      content:
        description: 公告内容
        type: string
      cover:
        description: 封面图
        type: string
      created_at:
        type: string
      created_by:
        description: 创建人ID
        type: integer
      expired_at:
        description: 过期时间
        type: string
      id:
        type: integer
      is_global:
        description: 是否全局公告
        type: boolean
      is_pinned:
        description: 是否置顶
        type: boolean
      published_at:
        description: 发布时间
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.AnnouncementStatus'
        description: 状态
      summary:
        description: 公告摘要
        type: string
      title:
        description: 公告标题
        type: string
      type:
        allOf:
        - $ref: '#/definitions/model.AnnouncementType'
        description: 公告类型
      updated_at:
        type: string
      updated_by:
        description: 更新人ID
        type: integer
      view_count:
        description: 浏览次数
        type: integer
    type: object
  model.AnnouncementStatus:
    enum:
    - draft
    - published
    - archived
    type: string
    x-enum-comments:
      AnnouncementStatusArchived: 已归档
      AnnouncementStatusDraft: 草稿
      AnnouncementStatusPublished: 已发布
    x-enum-descriptions:
    - 草稿
    - 已发布
    - 已归档
    x-enum-varnames:
    - AnnouncementStatusDraft
    - AnnouncementStatusPublished
    - AnnouncementStatusArchived
  model.AnnouncementType:
    enum:
    - normal
    - important
    - emergency
    - event
    type: string
    x-enum-comments:
      AnnouncementTypeEmergency: 紧急公告
      AnnouncementTypeEvent: 活动公告
      AnnouncementTypeImportant: 重要公告
      AnnouncementTypeNormal: 普通公告
    x-enum-descriptions:
    - 普通公告
    - 重要公告
    - 紧急公告
    - 活动公告
    x-enum-varnames:
    - AnnouncementTypeNormal
    - AnnouncementTypeImportant
    - AnnouncementTypeEmergency
    - AnnouncementTypeEvent
  model.Board:
    properties:
      cover:
        type: string
      created_at:
        type: string
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      post_count:
        type: integer
      post_role:
        $ref: '#/definitions/model.UserRole'
      reply_role:
        $ref: '#/definitions/model.UserRole'
      slug:
        type: string
      sort_order:
        type: integer
      thread_count:
        type: integer
      today_count:
        type: integer
      updated_at:
        type: string
      view_role:
        $ref: '#/definitions/model.UserRole'
    type: object
  model.BoardTree:
    properties:
      children:
        items:
          $ref: '#/definitions/model.BoardTree'
        type: array
      cover:
        type: string
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      post_count:
        type: integer
      post_role:
        $ref: '#/definitions/model.UserRole'
      reply_role:
        $ref: '#/definitions/model.UserRole'
      slug:
        type: string
      sort_order:
        type: integer
      thread_count:
        type: integer
      today_count:
        type: integer
      view_role:
        $ref: '#/definitions/model.UserRole'
    type: object
  model.Comment:
    properties:
      author:
        $ref: '#/definitions/model.User'
      author_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_accepted:
        description: 新增
        type: boolean
      is_answer:
        description: 新增
        type: boolean
      like_count:
        type: integer
      parent:
        $ref: '#/definitions/model.Comment'
      parent_id:
        type: integer
      post_id:
        type: integer
      replies:
        items:
          $ref: '#/definitions/model.Comment'
        type: array
      updated_at:
        type: string
      vote_count:
        description: 新增
        type: integer
    type: object
  model.CreateQuestionInput:
    properties:
      board_id:
        type: integer
      content:
        type: string
      cover:
        type: string
      reward_score:
        maximum: 100
        minimum: 0
        type: integer
      summary:
        maxLength: 500
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        maxLength: 100
        type: string
    required:
    - content
    - title
    type: object
  model.Moderator:
    properties:
      board:
        $ref: '#/definitions/model.Board'
      board_id:
        type: integer
      can_ban_user:
        type: boolean
      can_delete_post:
        type: boolean
      can_edit_any_post:
        type: boolean
      can_manage_moderator:
        type: boolean
      can_pin_post:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      permissions:
        type: object
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.User'
      user_id:
        type: integer
    type: object
  model.Notification:
