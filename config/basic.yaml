# Basic Configuration
# 基础配置，可提交到版本控制

# 服务器配置
server:
  port: 8080
  mode: debug
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576

# API配置
api:
  protocol: http
  host: localhost
  port: 8080
  version: v1
  prefix: /api

# JWT配置（默认值，会被 private.yaml 覆盖）
jwt:
  expire: 24h
  refresh_expire: 168h
  issuer: "tiny-forum"

# 日志配置
log:
  level: info
  filename: ./logs/app.log
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true
  console: true
  json_format: false

# 限流配置
rate_limit:
  enabled: true
  requests: 100
  duration: 60
  burst: 50

# Ollama AI 配置
ollama:
  base_url: http://localhost:11434
  model: qwen3:0.6b
  num_predict: 256
  temperature: 0.7
  timeout: 60

# CORS 跨域配置
allow_origins:
  - http://localhost:3000
  - http://127.0.0.1:3000
  - http://localhost:8080
  - http://127.0.0.1:8080

# 上传配置
upload:
  max_size: 10485760
  allowed_types:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp
    - .pdf
    - .zip
  avatar:
    max_size: 2097152
    allowed_types:
      - .jpg
      - .jpeg
      - .png
      - .webp
    width: 512
    height: 512
  post_image:
    max_size: 5242880
    allowed_types:
      - .jpg
      - .jpeg
      - .png
      - .gif
      - .webp
  storage:
    type: local
    local_path: ./uploads
    url_prefix: /uploads/
