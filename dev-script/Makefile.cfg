# ==============================================================================
# Makefile.cfg  —  YAML 配置文件管理
#
# 职责：仅负责 backend/config/*.yaml 的读取、创建、检查和变量提取。
#       .env 环境变量由 Makefile.env 负责，两者相互独立。
#
# 用法：在父 Makefile 中加入：
#         include dev-script/Makefile.cfg
#
# 快速开始：
#   make cfg-help                    查看所有 cfg 相关命令
#   make cfg-init                    从 example 生成所有配置文件
#   make cfg-show                    查看所有 yaml 中读取到的值
#   make cfg-check                   检查配置文件是否存在且可解析
#   make cfg-get FILE=basic KEY=server.port   读取单个配置项
# ==============================================================================

# ── 路径 ──────────────────────────────────────────────────────────────────────
_CFG_SELF_DIR := $(dir $(abspath $(lastword $(MAKEFILE_LIST))))
_CFG_ROOT     := $(abspath $(_CFG_SELF_DIR)/..)
CFG_DIR       ?= $(_CFG_ROOT)/backend/config

# 配置文件路径
CFG_BASIC         := $(CFG_DIR)/basic.yaml
CFG_PRIVATE       := $(CFG_DIR)/private.yaml
CFG_RISK          := $(CFG_DIR)/risk_control.yaml
CFG_BASIC_EXAMPLE := $(CFG_DIR)/basic.example.yaml
CFG_PRIV_EXAMPLE  := $(CFG_DIR)/private.example.yaml

# 回退：正式文件不存在则读 example
_CFG_BASIC_SRC := $(or $(wildcard $(CFG_BASIC)),$(CFG_BASIC_EXAMPLE))
_CFG_PRIV_SRC  := $(or $(wildcard $(CFG_PRIVATE)),$(CFG_PRIV_EXAMPLE))

# ── 工具检测（which 兼容 /bin/sh）───────────────────────────────────────────
_CFG_YQ      := $(shell which yq      2>/dev/null)
_CFG_PYTHON3 := $(shell which python3 2>/dev/null)

# Python 解析脚本（写到临时文件，避免 shell 函数括号嵌套语法错误）
_CFG_PY := /tmp/_makefile_cfg_yaml.py
$(shell printf '%s\n' \
  'import sys, functools' \
  'try: import yaml' \
  'except ImportError: print("__NO_PYYAML__"); sys.exit(0)' \
  'path, key = sys.argv[1], sys.argv[2]' \
  'try: d = yaml.safe_load(open(path))' \
  'except Exception as e: print("__ERR__:" + str(e)); sys.exit(1)' \
  'v = functools.reduce(lambda a,k: a.get(k,{}) if isinstance(a,dict) else "", key.split("."), d)' \
  'print("" if isinstance(v,(dict,list,type(None))) else v)' \
  > $(_CFG_PY))

# cfg_val(file, dotted.key) → 裸字符串值
ifneq ($(_CFG_YQ),)
  cfg_val = $(shell $(_CFG_YQ) -r '.$(2) // ""' '$(1)' 2>/dev/null)
  _CFG_PARSER := yq ($(_CFG_YQ))
else ifneq ($(_CFG_PYTHON3),)
  cfg_val = $(shell $(_CFG_PYTHON3) $(_CFG_PY) '$(1)' '$(2)' 2>/dev/null)
  _CFG_PARSER := python3 ($(_CFG_PYTHON3))
else
  cfg_val =
  _CFG_PARSER := 无（未找到 yq 或 python3）
  $(warning [Makefile.cfg] 警告：未找到 yq 或 python3，无法解析 YAML)
endif

# ── 读取 basic.yaml ───────────────────────────────────────────────────────────
ifneq ("$(wildcard $(_CFG_BASIC_SRC))","")
  CFG_SERVER_PORT    := $(call cfg_val,$(_CFG_BASIC_SRC),server.port)
  CFG_SERVER_MODE    := $(call cfg_val,$(_CFG_BASIC_SRC),server.mode)
  CFG_LOG_LEVEL      := $(call cfg_val,$(_CFG_BASIC_SRC),log.level)
  CFG_LOG_FILE       := $(call cfg_val,$(_CFG_BASIC_SRC),log.filename)
  CFG_UPLOAD_PATH    := $(call cfg_val,$(_CFG_BASIC_SRC),upload.storage_path)
  CFG_UPLOAD_MAX     := $(call cfg_val,$(_CFG_BASIC_SRC),upload.max_size)
  CFG_CDN_DOMAIN     := $(call cfg_val,$(_CFG_BASIC_SRC),upload.cdn_domain)
  CFG_RATE_ENABLED   := $(call cfg_val,$(_CFG_BASIC_SRC),rate_limit.enabled)
  CFG_RATE_REQUESTS  := $(call cfg_val,$(_CFG_BASIC_SRC),rate_limit.requests)
  CFG_RATE_DURATION  := $(call cfg_val,$(_CFG_BASIC_SRC),rate_limit.duration)
  CFG_OLLAMA_URL     := $(call cfg_val,$(_CFG_BASIC_SRC),ollama.base_url)
  CFG_OLLAMA_MODEL   := $(call cfg_val,$(_CFG_BASIC_SRC),ollama.model)
  CFG_JWT_EXPIRE_B   := $(call cfg_val,$(_CFG_BASIC_SRC),jwt.expire)
  CFG_JWT_ISSUER     := $(call cfg_val,$(_CFG_BASIC_SRC),jwt.issuer)
endif

# ── 读取 private.yaml ─────────────────────────────────────────────────────────
ifneq ("$(wildcard $(_CFG_PRIV_SRC))","")
  CFG_DB_HOST        := $(call cfg_val,$(_CFG_PRIV_SRC),database.host)
  CFG_DB_PORT        := $(call cfg_val,$(_CFG_PRIV_SRC),database.port)
  CFG_DB_USER        := $(call cfg_val,$(_CFG_PRIV_SRC),database.user)
  CFG_DB_PASSWORD    := $(call cfg_val,$(_CFG_PRIV_SRC),database.password)
  CFG_DB_NAME        := $(call cfg_val,$(_CFG_PRIV_SRC),database.dbname)
  CFG_DB_SSLMODE     := $(call cfg_val,$(_CFG_PRIV_SRC),database.sslmode)
  CFG_REDIS_HOST     := $(call cfg_val,$(_CFG_PRIV_SRC),redis.host)
  CFG_REDIS_PORT     := $(call cfg_val,$(_CFG_PRIV_SRC),redis.port)
  CFG_REDIS_PASS     := $(call cfg_val,$(_CFG_PRIV_SRC),redis.password)
  CFG_EMAIL_HOST     := $(call cfg_val,$(_CFG_PRIV_SRC),email.host)
  CFG_EMAIL_PORT     := $(call cfg_val,$(_CFG_PRIV_SRC),email.port)
  CFG_EMAIL_USER     := $(call cfg_val,$(_CFG_PRIV_SRC),email.username)
  CFG_EMAIL_FROM     := $(call cfg_val,$(_CFG_PRIV_SRC),email.from)
  CFG_JWT_SECRET     := $(call cfg_val,$(_CFG_PRIV_SRC),jwt.secret)
  CFG_JWT_EXPIRE     := $(call cfg_val,$(_CFG_PRIV_SRC),jwt.expire)
  CFG_ADMIN_EMAIL    := $(call cfg_val,$(_CFG_PRIV_SRC),admin.email)
  CFG_ADMIN_USER     := $(call cfg_val,$(_CFG_PRIV_SRC),admin.username)
  CFG_SERVER_PORT_P  := $(call cfg_val,$(_CFG_PRIV_SRC),server.port)
  CFG_SERVER_MODE_P  := $(call cfg_val,$(_CFG_PRIV_SRC),server.mode)
endif

# ── 颜色 ──────────────────────────────────────────────────────────────────────
_C_RESET  := \033[0m
_C_BOLD   := \033[1m
_C_GREEN  := \033[32m
_C_YELLOW := \033[33m
_C_RED    := \033[31m
_C_CYAN   := \033[36m
_C_GRAY   := \033[90m
_C_BLUE   := \033[34m

# ==============================================================================
# 目标
# ==============================================================================
.PHONY: cfg-help cfg-init cfg-edit cfg-show cfg-check cfg-get cfg-diff cfg-validate

# ── cfg-help ──────────────────────────────────────────────────────────────────
## 显示 cfg 模块帮助
cfg-help:
	@printf "$(_C_BOLD)$(_C_CYAN)Makefile.cfg — YAML 配置文件管理$(_C_RESET)\n"
	@printf "\n"
	@printf "$(_C_BOLD)配置文件$(_C_RESET)\n"
	@printf "  %-35s %s\n" "$(CFG_BASIC)"         "主配置（服务器/日志/上传/限流/Ollama）"
	@printf "  %-35s %s\n" "$(CFG_PRIVATE)"       "私密配置（数据库/Redis/邮件/JWT/管理员）"
	@printf "  %-35s %s\n" "$(CFG_RISK)"          "风控配置（频率限制/IP 白名单）"
	@printf "  %-35s %s\n" "$(CFG_BASIC_EXAMPLE)" "basic 示例文件"
	@printf "  %-35s %s\n" "$(CFG_PRIV_EXAMPLE)"  "private 示例文件"
	@printf "\n"
	@printf "$(_C_BOLD)解析工具$(_C_RESET)\n"
	@printf "  $(_CFG_PARSER)\n"
	@printf "\n"
	@printf "$(_C_BOLD)命令$(_C_RESET)\n"
	@printf "  $(_C_GREEN)make cfg-init$(_C_RESET)                             从 example 生成所有 yaml\n"
	@printf "  $(_C_GREEN)make cfg-init FILE=basic$(_C_RESET)                  只生成 basic.yaml\n"
	@printf "  $(_C_GREEN)make cfg-init FORCE=1$(_C_RESET)                     强制覆盖已有文件\n"
	@printf "  $(_C_GREEN)make cfg-edit FILE=basic$(_C_RESET)                  用 \$$EDITOR 编辑配置文件\n"
	@printf "  $(_C_GREEN)make cfg-show$(_C_RESET)                             打印所有已读取的配置值\n"
	@printf "  $(_C_GREEN)make cfg-show FILE=basic$(_C_RESET)                  只打印 basic.yaml 的值\n"
	@printf "  $(_C_GREEN)make cfg-check$(_C_RESET)                            检查配置文件是否存在\n"
	@printf "  $(_C_GREEN)make cfg-validate$(_C_RESET)                         校验关键配置项格式\n"
	@printf "  $(_C_GREEN)make cfg-get FILE=basic KEY=server.port$(_C_RESET)   读取单个配置项\n"
	@printf "  $(_C_GREEN)make cfg-diff$(_C_RESET)                             对比 yaml 与 example 的差异\n"
	@printf "\n"
	@printf "$(_C_BOLD)FILE 可选值$(_C_RESET):  basic  |  private  |  risk\n"

# ── cfg-init ──────────────────────────────────────────────────────────────────
## 从 example 生成配置文件
cfg-init:
	@_do_copy() { \
	  src=$$1; dst=$$2; label=$$3; \
	  if [ ! -f "$$src" ]; then \
	    printf "$(_C_RED)[cfg] 未找到示例文件 $$src$(_C_RESET)\n"; return; \
	  fi; \
	  if [ -f "$$dst" ] && [ "$(FORCE)" != "1" ]; then \
	    printf "$(_C_YELLOW)[cfg] $$label 已存在，跳过（FORCE=1 可覆盖）$(_C_RESET)\n"; \
	  else \
	    cp "$$src" "$$dst"; \
	    printf "$(_C_GREEN)[cfg] ✅ 已生成 $$dst$(_C_RESET)\n"; \
	  fi; \
	}; \
	case "$(FILE)" in \
	  basic)   _do_copy $(CFG_BASIC_EXAMPLE) $(CFG_BASIC)   basic.yaml   ;; \
	  private) _do_copy $(CFG_PRIV_EXAMPLE)  $(CFG_PRIVATE) private.yaml ;; \
	  risk)    printf "$(_C_YELLOW)[cfg] risk_control.yaml 无 example，请手动创建$(_C_RESET)\n" ;; \
	  *)       _do_copy $(CFG_BASIC_EXAMPLE) $(CFG_BASIC)   basic.yaml; \
	           _do_copy $(CFG_PRIV_EXAMPLE)  $(CFG_PRIVATE) private.yaml ;; \
	esac

# ── cfg-edit ──────────────────────────────────────────────────────────────────
## 用 $EDITOR 编辑配置文件  FILE=basic|private|risk
cfg-edit:
	@case "$(FILE)" in \
	  basic)   f=$(CFG_BASIC)   ;; \
	  private) f=$(CFG_PRIVATE) ;; \
	  risk)    f=$(CFG_RISK)    ;; \
	  *)       printf "$(_C_RED)[cfg] 用法: make cfg-edit FILE=basic|private|risk$(_C_RESET)\n"; exit 1 ;; \
	esac; \
	if [ ! -f "$$f" ]; then \
	  printf "$(_C_YELLOW)[cfg] $$f 不存在，请先运行 make cfg-init$(_C_RESET)\n"; exit 1; \
	fi; \
	$${EDITOR:-vi} $$f

# ── cfg-show ──────────────────────────────────────────────────────────────────
## 打印从 yaml 读取到的所有配置值
cfg-show:
	@printf "$(_C_BOLD)$(_C_CYAN)=== YAML 配置值 ===$(_C_RESET)\n"
	@printf "$(_C_GRAY)解析工具: $(_CFG_PARSER)$(_C_RESET)\n\n"
	@case "$(FILE)" in \
	  basic)   only_basic=1; only_priv=0 ;; \
	  private) only_basic=0; only_priv=1 ;; \
	  *)       only_basic=1; only_priv=1 ;; \
	esac; \
	if [ "$$only_basic" = "1" ]; then \
	  printf "$(_C_BOLD)[basic.yaml → $(or $(wildcard $(CFG_BASIC)),$(CFG_BASIC_EXAMPLE))]$(_C_RESET)\n"; \
	  printf "  $(_C_BLUE)# 服务器$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "server.port"           "$(CFG_SERVER_PORT)"; \
	  printf "  %-30s = %s\n" "server.mode"           "$(CFG_SERVER_MODE)"; \
	  printf "  $(_C_BLUE)# 日志$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "log.level"             "$(CFG_LOG_LEVEL)"; \
	  printf "  %-30s = %s\n" "log.filename"          "$(CFG_LOG_FILE)"; \
	  printf "  $(_C_BLUE)# 上传$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "upload.storage_path"   "$(CFG_UPLOAD_PATH)"; \
	  printf "  %-30s = %s\n" "upload.max_size"       "$(CFG_UPLOAD_MAX)"; \
	  printf "  %-30s = %s\n" "upload.cdn_domain"     "$(CFG_CDN_DOMAIN)"; \
	  printf "  $(_C_BLUE)# 限流$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "rate_limit.enabled"    "$(CFG_RATE_ENABLED)"; \
	  printf "  %-30s = %s\n" "rate_limit.requests"   "$(CFG_RATE_REQUESTS)"; \
	  printf "  %-30s = %s\n" "rate_limit.duration"   "$(CFG_RATE_DURATION)"; \
	  printf "  $(_C_BLUE)# Ollama$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "ollama.base_url"       "$(CFG_OLLAMA_URL)"; \
	  printf "  %-30s = %s\n" "ollama.model"          "$(CFG_OLLAMA_MODEL)"; \
	  printf "  $(_C_BLUE)# JWT（basic）$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "jwt.expire"            "$(CFG_JWT_EXPIRE_B)"; \
	  printf "  %-30s = %s\n" "jwt.issuer"            "$(CFG_JWT_ISSUER)"; \
	  printf "\n"; \
	fi; \
	if [ "$$only_priv" = "1" ]; then \
	  printf "$(_C_BOLD)[private.yaml → $(or $(wildcard $(CFG_PRIVATE)),$(CFG_PRIV_EXAMPLE))]$(_C_RESET)\n"; \
	  printf "  $(_C_BLUE)# 数据库$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "database.host"         "$(CFG_DB_HOST)"; \
	  printf "  %-30s = %s\n" "database.port"         "$(CFG_DB_PORT)"; \
	  printf "  %-30s = %s\n" "database.user"         "$(CFG_DB_USER)"; \
	  printf "  %-30s = %s\n" "database.password"     "$(CFG_DB_PASSWORD)"; \
	  printf "  %-30s = %s\n" "database.dbname"       "$(CFG_DB_NAME)"; \
	  printf "  %-30s = %s\n" "database.sslmode"      "$(CFG_DB_SSLMODE)"; \
	  printf "  $(_C_BLUE)# Redis$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "redis.host"            "$(CFG_REDIS_HOST)"; \
	  printf "  %-30s = %s\n" "redis.port"            "$(CFG_REDIS_PORT)"; \
	  printf "  $(_C_BLUE)# 邮件$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "email.host"            "$(CFG_EMAIL_HOST)"; \
	  printf "  %-30s = %s\n" "email.port"            "$(CFG_EMAIL_PORT)"; \
	  printf "  %-30s = %s\n" "email.username"        "$(CFG_EMAIL_USER)"; \
	  printf "  %-30s = %s\n" "email.from"            "$(CFG_EMAIL_FROM)"; \
	  printf "  $(_C_BLUE)# JWT（private）$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "jwt.secret"            "$(CFG_JWT_SECRET)"; \
	  printf "  %-30s = %s\n" "jwt.expire"            "$(CFG_JWT_EXPIRE)"; \
	  printf "  $(_C_BLUE)# 管理员$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "admin.email"           "$(CFG_ADMIN_EMAIL)"; \
	  printf "  %-30s = %s\n" "admin.username"        "$(CFG_ADMIN_USER)"; \
	  printf "  $(_C_BLUE)# 服务器（private 覆盖）$(_C_RESET)\n"; \
	  printf "  %-30s = %s\n" "server.port"           "$(CFG_SERVER_PORT_P)"; \
	  printf "  %-30s = %s\n" "server.mode"           "$(CFG_SERVER_MODE_P)"; \
	  printf "\n"; \
	fi

# ── cfg-check ─────────────────────────────────────────────────────────────────
## 检查配置文件是否存在且可被解析
cfg-check:
	@printf "$(_C_BOLD)[cfg] 检查配置文件...$(_C_RESET)\n"
	@failed=0; \
	_check_file() { \
	  label=$$1; path=$$2; required=$$3; \
	  if [ -f "$$path" ]; then \
	    printf "  $(_C_GREEN)✓ %-12s %s$(_C_RESET)\n" "$$label" "$$path"; \
	  elif [ "$$required" = "1" ]; then \
	    printf "  $(_C_RED)✗ %-12s %s  （必需，不存在）$(_C_RESET)\n" "$$label" "$$path"; \
	    failed=1; \
	  else \
	    printf "  $(_C_YELLOW)- %-12s %s  （可选，不存在）$(_C_RESET)\n" "$$label" "$$path"; \
	  fi; \
	}; \
	_check_file "basic.yaml"   $(CFG_BASIC)   1; \
	_check_file "private.yaml" $(CFG_PRIVATE) 1; \
	_check_file "risk.yaml"    $(CFG_RISK)    0; \
	printf "\n$(_C_BOLD)[cfg] 检查 example 文件...$(_C_RESET)\n"; \
	_check_file "basic.example"   $(CFG_BASIC_EXAMPLE) 0; \
	_check_file "private.example" $(CFG_PRIV_EXAMPLE)  0; \
	printf "\n$(_C_BOLD)[cfg] 解析工具...$(_C_RESET)\n"; \
	printf "  $(_CFG_PARSER)\n"; \
	printf "\n"; \
	if [ "$$failed" = "1" ]; then \
	  printf "$(_C_RED)[cfg] ❌ 配置文件检查失败，请先运行 make cfg-init$(_C_RESET)\n"; exit 1; \
	else \
	  printf "$(_C_GREEN)[cfg] ✅ 配置文件检查通过$(_C_RESET)\n"; \
	fi

# ── cfg-validate ──────────────────────────────────────────────────────────────
## 校验关键配置项格式
cfg-validate:
	@printf "$(_C_BOLD)[cfg] 校验配置项格式...$(_C_RESET)\n"
	@if [ -z "$(_CFG_YQ)$(_CFG_PYTHON3)" ]; then \
	  printf "$(_C_RED)[cfg] ❌ 无解析工具，跳过校验$(_C_RESET)\n"; exit 1; \
	fi
	@failed=0; \
	_ok()   { printf "  $(_C_GREEN)✓ %-35s = %s$(_C_RESET)\n" "$$1" "$$2"; }; \
	_fail() { printf "  $(_C_RED)✗ %-35s = %s  (%s)$(_C_RESET)\n" "$$1" "$$2" "$$3"; failed=1; }; \
	_warn() { printf "  $(_C_YELLOW)! %-35s = %s  (%s)$(_C_RESET)\n" "$$1" "$$2" "$$3"; }; \
	\
	port="$(CFG_SERVER_PORT)"; \
	if echo "$$port" | grep -qE '^[0-9]+$$' && [ "$$port" -ge 1 ] && [ "$$port" -le 65535 ]; then \
	  _ok "basic → server.port" "$$port"; \
	else _fail "basic → server.port" "$$port" "应为 1–65535"; fi; \
	\
	mode="$(CFG_SERVER_MODE)"; \
	if echo "$$mode" | grep -qE '^(debug|release|test)$$'; then \
	  _ok "basic → server.mode" "$$mode"; \
	else _fail "basic → server.mode" "$$mode" "应为 debug/release/test"; fi; \
	\
	lvl="$(CFG_LOG_LEVEL)"; \
	if echo "$$lvl" | grep -qE '^(debug|info|warn|error)$$'; then \
	  _ok "basic → log.level" "$$lvl"; \
	else _fail "basic → log.level" "$$lvl" "应为 debug/info/warn/error"; fi; \
	\
	dbport="$(CFG_DB_PORT)"; \
	if echo "$$dbport" | grep -qE '^[0-9]+$$' && [ "$$dbport" -ge 1 ] && [ "$$dbport" -le 65535 ]; then \
	  _ok "private → database.port" "$$dbport"; \
	else _fail "private → database.port" "$$dbport" "应为 1–65535"; fi; \
	\
	secret="$(CFG_JWT_SECRET)"; \
	slen=$${#secret}; \
	if [ "$$slen" -ge 32 ]; then \
	  _ok "private → jwt.secret (len=$$slen)" "***"; \
	else _fail "private → jwt.secret" "len=$$slen" "长度应 ≥ 32"; fi; \
	\
	expire="$(CFG_JWT_EXPIRE)"; \
	if echo "$$expire" | grep -qE '^[0-9]+(h|m|s)$$'; then \
	  _ok "private → jwt.expire" "$$expire"; \
	else _warn "private → jwt.expire" "$$expire" "建议格式如 24h / 30m"; fi; \
	\
	if [ "$$failed" = "1" ]; then \
	  printf "\n$(_C_RED)[cfg] ❌ 校验失败，请修正配置文件$(_C_RESET)\n"; exit 1; \
	else \
	  printf "\n$(_C_GREEN)[cfg] ✅ 校验通过$(_C_RESET)\n"; \
	fi

# ── cfg-get ───────────────────────────────────────────────────────────────────
## 读取单个配置项  用法: make cfg-get FILE=basic KEY=server.port
cfg-get:
	@if [ -z "$(FILE)" ] || [ -z "$(KEY)" ]; then \
	  printf "$(_C_RED)[cfg] 用法: make cfg-get FILE=basic|private|risk KEY=dotted.key$(_C_RESET)\n"; exit 1; \
	fi
	@case "$(FILE)" in \
	  basic)   f=$(_CFG_BASIC_SRC)  ;; \
	  private) f=$(_CFG_PRIV_SRC)   ;; \
	  risk)    f=$(CFG_RISK)        ;; \
	  *)       printf "$(_C_RED)[cfg] FILE 应为 basic / private / risk$(_C_RESET)\n"; exit 1 ;; \
	esac; \
	if [ ! -f "$$f" ]; then \
	  printf "$(_C_RED)[cfg] 文件不存在: $$f$(_C_RESET)\n"; exit 1; \
	fi; \
	if [ -z "$(_CFG_YQ)$(_CFG_PYTHON3)" ]; then \
	  printf "$(_C_RED)[cfg] 无解析工具（yq / python3）$(_C_RESET)\n"; exit 1; \
	fi; \
	val=$(call cfg_val,$$f,$(KEY)); \
	if [ -z "$$val" ]; then \
	  printf "$(_C_YELLOW)[cfg] $(KEY) 在 $$f 中为空或不存在$(_C_RESET)\n"; \
	else \
	  printf "$(KEY)=$$val\n"; \
	fi

# ── cfg-diff ──────────────────────────────────────────────────────────────────
## 对比 yaml 与 example，检查是否有顶层 key 缺失
cfg-diff:
	@if [ -z "$(_CFG_YQ)$(_CFG_PYTHON3)" ]; then \
	  printf "$(_C_RED)[cfg] 无解析工具，无法对比$(_C_RESET)\n"; exit 1; \
	fi
	@printf "$(_C_BOLD)[cfg] 对比 basic.yaml ↔ basic.example.yaml$(_C_RESET)\n"
	@_top_keys() { \
	  f=$$1; \
	  if [ -n "$(_CFG_YQ)" ]; then \
	    $(_CFG_YQ) -r 'keys[]' "$$f" 2>/dev/null | sort; \
	  else \
	    $(_CFG_PYTHON3) -c \
	      "import yaml,sys; d=yaml.safe_load(open('$$f')); [print(k) for k in sorted(d.keys())]" \
	      2>/dev/null; \
	  fi; \
	}; \
	if [ -f "$(CFG_BASIC)" ] && [ -f "$(CFG_BASIC_EXAMPLE)" ]; then \
	  bkeys=$$(_top_keys $(CFG_BASIC)); \
	  ekeys=$$(_top_keys $(CFG_BASIC_EXAMPLE)); \
	  missing=$$(comm -23 <(echo "$$ekeys") <(echo "$$bkeys")); \
	  extra=$$(comm -13 <(echo "$$ekeys") <(echo "$$bkeys")); \
	  if [ -n "$$missing" ]; then \
	    printf "$(_C_RED)  example 有但 basic.yaml 缺少: $$missing$(_C_RESET)\n"; \
	  fi; \
	  if [ -n "$$extra" ]; then \
	    printf "$(_C_YELLOW)  basic.yaml 有但 example 没有（自定义节）: $$extra$(_C_RESET)\n"; \
	  fi; \
	  if [ -z "$$missing" ] && [ -z "$$extra" ]; then \
	    printf "$(_C_GREEN)  ✅ basic.yaml 与 example 顶层 key 一致$(_C_RESET)\n"; \
	  fi; \
	else \
	  printf "$(_C_YELLOW)  跳过（文件不存在）$(_C_RESET)\n"; \
	fi
	@printf "\n$(_C_BOLD)[cfg] 对比 private.yaml ↔ private.example.yaml$(_C_RESET)\n"
	@_top_keys() { \
	  f=$$1; \
	  if [ -n "$(_CFG_YQ)" ]; then \
	    $(_CFG_YQ) -r 'keys[]' "$$f" 2>/dev/null | sort; \
	  else \
	    $(_CFG_PYTHON3) -c \
	      "import yaml,sys; d=yaml.safe_load(open('$$f')); [print(k) for k in sorted(d.keys())]" \
	      2>/dev/null; \
	  fi; \
	}; \
	if [ -f "$(CFG_PRIVATE)" ] && [ -f "$(CFG_PRIV_EXAMPLE)" ]; then \
	  bkeys=$$(_top_keys $(CFG_PRIVATE)); \
	  ekeys=$$(_top_keys $(CFG_PRIV_EXAMPLE)); \
	  missing=$$(comm -23 <(echo "$$ekeys") <(echo "$$bkeys")); \
	  extra=$$(comm -13 <(echo "$$ekeys") <(echo "$$bkeys")); \
	  if [ -n "$$missing" ]; then \
	    printf "$(_C_RED)  example 有但 private.yaml 缺少: $$missing$(_C_RESET)\n"; \
	  fi; \
	  if [ -n "$$extra" ]; then \
	    printf "$(_C_YELLOW)  private.yaml 有但 example 没有（自定义节）: $$extra$(_C_RESET)\n"; \
	  fi; \
	  if [ -z "$$missing" ] && [ -z "$$extra" ]; then \
	    printf "$(_C_GREEN)  ✅ private.yaml 与 example 顶层 key 一致$(_C_RESET)\n"; \
	  fi; \
	else \
	  printf "$(_C_YELLOW)  跳过（文件不存在）$(_C_RESET)\n"; \
	fi