# ==============================================================================
# Makefile.cfg  —  YAML 配置文件管理（无 example 依赖）
#
# 直接管理以下五个配置文件：
#   basic.yaml, private.yaml, risk_control.yml, postgres.yml, redis.yml
# ==============================================================================


_CFG_YQ      := $(shell command -v yq      2>/dev/null)
_CFG_PYTHON3 := $(shell command -v python3 2>/dev/null)

# Python 解析脚本（支持嵌套 key，如 server.port）
_CFG_PY_SCRIPT := /tmp/_makefile_cfg_yaml.py
define _CFG_PY_CODE
import sys, functools
try:
    import yaml
except ImportError:
    print("__NO_PYYAML__")
    sys.exit(0)
path, key = sys.argv[1], sys.argv[2]
try:
    d = yaml.safe_load(open(path))
except Exception as e:
    print("__ERR__:" + str(e))
    sys.exit(1)
v = functools.reduce(lambda a, k: a.get(k, {}) if isinstance(a, dict) else "", key.split("."), d)
if isinstance(v, (dict, list, type(None))):
    print("")
else:
    print(v)
endef
export _CFG_PY_CODE
$(_CFG_PY_SCRIPT): ; @printf '%s\n' "$$_CFG_PY_CODE" > $@

# 检查解析工具可用性
ifneq ($(_CFG_YQ),)
  _CFG_PARSER := yq ($(_CFG_YQ))
  cfg_val = $(shell $(_CFG_YQ) -r '.$(2) // ""' '$(1)' 2>/dev/null)
else ifneq ($(_CFG_PYTHON3),)
  _CFG_PY_READY := $(shell $(_CFG_PYTHON3) -c "import yaml" 2>/dev/null && echo "yes")
  ifeq ($(_CFG_PY_READY),yes)
    _CFG_PARSER := python3 + PyYAML ($(_CFG_PYTHON3))
    # 生成临时脚本
    _DUMMY := $(shell $(MAKE) -s $(_CFG_PY_SCRIPT) 2>/dev/null)
    cfg_val = $(shell $(_CFG_PYTHON3) $(_CFG_PY_SCRIPT) '$(1)' '$(2)' 2>/dev/null)
  else
    _CFG_PARSER := python3 已安装但缺少 PyYAML（请运行: pip3 install pyyaml）
    cfg_val =
  endif
else
  _CFG_PARSER := 无（未找到 yq 或 python3）
  cfg_val =
  $(warning [Makefile.cfg] 警告：未找到 yq 或 python3，无法解析 YAML)
endif

# ── 读取配置文件中的关键变量 ─────────────────────────────────────────────────
# basic.yaml
ifneq ("$(wildcard $(CFG_BASIC))","")
  CFG_SERVER_PORT    := $(call cfg_val,$(CFG_BASIC),server.port)
  CFG_SERVER_MODE    := $(call cfg_val,$(CFG_BASIC),server.mode)
  CFG_LOG_LEVEL      := $(call cfg_val,$(CFG_BASIC),log.level)
  CFG_LOG_FILE       := $(call cfg_val,$(CFG_BASIC),log.filename)
  CFG_UPLOAD_PATH    := $(call cfg_val,$(CFG_BASIC),upload.storage_path)
  CFG_UPLOAD_MAX     := $(call cfg_val,$(CFG_BASIC),upload.max_size)
  CFG_CDN_DOMAIN     := $(call cfg_val,$(CFG_BASIC),upload.cdn_domain)
  CFG_RATE_ENABLED   := $(call cfg_val,$(CFG_BASIC),rate_limit.enabled)
  CFG_RATE_REQUESTS  := $(call cfg_val,$(CFG_BASIC),rate_limit.requests)
  CFG_RATE_DURATION  := $(call cfg_val,$(CFG_BASIC),rate_limit.duration)
  CFG_OLLAMA_URL     := $(call cfg_val,$(CFG_BASIC),ollama.base_url)
  CFG_OLLAMA_MODEL   := $(call cfg_val,$(CFG_BASIC),ollama.model)
  CFG_JWT_EXPIRE_B   := $(call cfg_val,$(CFG_BASIC),jwt.expire)
  CFG_JWT_ISSUER     := $(call cfg_val,$(CFG_BASIC),jwt.issuer)
endif

# private.yaml
ifneq ("$(wildcard $(CFG_PRIVATE))","")
  CFG_DB_HOST        := $(call cfg_val,$(CFG_PRIVATE),database.host)
  CFG_DB_PORT        := $(call cfg_val,$(CFG_PRIVATE),database.port)
  CFG_DB_USER        := $(call cfg_val,$(CFG_PRIVATE),database.user)
  CFG_DB_PASSWORD    := $(call cfg_val,$(CFG_PRIVATE),database.password)
  CFG_DB_NAME        := $(call cfg_val,$(CFG_PRIVATE),database.dbname)
  CFG_DB_SSLMODE     := $(call cfg_val,$(CFG_PRIVATE),database.sslmode)
  CFG_REDIS_HOST     := $(call cfg_val,$(CFG_PRIVATE),redis.host)
  CFG_REDIS_PORT     := $(call cfg_val,$(CFG_PRIVATE),redis.port)
  CFG_REDIS_PASS     := $(call cfg_val,$(CFG_PRIVATE),redis.password)
  CFG_EMAIL_HOST     := $(call cfg_val,$(CFG_PRIVATE),email.host)
  CFG_EMAIL_PORT     := $(call cfg_val,$(CFG_PRIVATE),email.port)
  CFG_EMAIL_USER     := $(call cfg_val,$(CFG_PRIVATE),email.username)
  CFG_EMAIL_FROM     := $(call cfg_val,$(CFG_PRIVATE),email.from)
  CFG_JWT_SECRET     := $(call cfg_val,$(CFG_PRIVATE),jwt.secret)
  CFG_JWT_EXPIRE     := $(call cfg_val,$(CFG_PRIVATE),jwt.expire)
  CFG_ADMIN_EMAIL    := $(call cfg_val,$(CFG_PRIVATE),admin.email)
  CFG_ADMIN_USER     := $(call cfg_val,$(CFG_PRIVATE),admin.username)
  CFG_SERVER_PORT_P  := $(call cfg_val,$(CFG_PRIVATE),server.port)
  CFG_SERVER_MODE_P  := $(call cfg_val,$(CFG_PRIVATE),server.mode)
endif

# ── 颜色（与主 Makefile 保持一致）────────────────────────────────────────────
ifeq ($(origin RED),undefined)
  RED    := \033[0;31m
  GREEN  := \033[0;32m
  YELLOW := \033[1;33m
  BLUE   := \033[0;34m
  CYAN   := \033[0;36m
  GRAY   := \033[0;90m
  BOLD   := \033[1m
  NC     := \033[0m
endif

.PHONY: cfg-help cfg-init cfg-edit cfg-show cfg-check cfg-get cfg-validate

# @由于无 example 文件，此命令仅做提示
cfg-init:
	@printf "$(YELLOW)[cfg] 没有独立的 example 文件，请直接编辑现有配置文件。$(NC)\n"
	@printf "        运行 $(GREEN)make cfg-edit FILE=basic$(NC) 开始编辑。\n"

# @辑配置文件
cfg-edit:
	@case "$(FILE)" in \
	  basic)    f=$(CFG_BASIC)    ;; \
	  private)  f=$(CFG_PRIVATE)  ;; \
	  risk)     f=$(CFG_RISK)     ;; \
	  postgres) f=$(CFG_POSTGRES) ;; \
	  redis)    f=$(CFG_REDIS)    ;; \
	  *) \
	    printf "$(RED)[cfg] 用法: make cfg-edit FILE=basic|private|risk|postgres|redis$(NC)\n"; \
	    exit 1 ;; \
	esac; \
	if [ ! -f "$$f" ]; then \
	  printf "$(YELLOW)[cfg] $$f 不存在，请先创建该文件$(NC)\n"; \
	  exit 1; \
	fi; \
	$${EDITOR:-vi} $$f

# @打印从 yaml 读取到的所有配置值
cfg-show:
	@printf "$(BOLD)$(CYAN)=== YAML 配置值 ===$(NC)\n"
	@printf "$(GRAY)解析工具: $(_CFG_PARSER)$(NC)\n\n"
	@case "$(FILE)" in \
	  basic)   only_basic=1; only_priv=0 ;; \
	  private) only_basic=0; only_priv=1 ;; \
	  *)       only_basic=1; only_priv=1 ;; \
	esac; \
	if [ "$$only_basic" = "1" ]; then \
	  printf "$(BOLD)[$(CFG_BASIC)]$(NC)\n"; \
	  printf "  $(BLUE)# 服务器$(NC)\n"; \
	  printf "  %-30s = %s\n" "server.port"           "$(CFG_SERVER_PORT)"; \
	  printf "  %-30s = %s\n" "server.mode"           "$(CFG_SERVER_MODE)"; \
	  printf "  $(BLUE)# 日志$(NC)\n"; \
	  printf "  %-30s = %s\n" "log.level"             "$(CFG_LOG_LEVEL)"; \
	  printf "  %-30s = %s\n" "log.filename"          "$(CFG_LOG_FILE)"; \
	  printf "  $(BLUE)# 上传$(NC)\n"; \
	  printf "  %-30s = %s\n" "upload.storage_path"   "$(CFG_UPLOAD_PATH)"; \
	  printf "  %-30s = %s\n" "upload.max_size"       "$(CFG_UPLOAD_MAX)"; \
	  printf "  %-30s = %s\n" "upload.cdn_domain"     "$(CFG_CDN_DOMAIN)"; \
	  printf "  $(BLUE)# 限流$(NC)\n"; \
	  printf "  %-30s = %s\n" "rate_limit.enabled"    "$(CFG_RATE_ENABLED)"; \
	  printf "  %-30s = %s\n" "rate_limit.requests"   "$(CFG_RATE_REQUESTS)"; \
	  printf "  %-30s = %s\n" "rate_limit.duration"   "$(CFG_RATE_DURATION)"; \
	  printf "  $(BLUE)# Ollama$(NC)\n"; \
	  printf "  %-30s = %s\n" "ollama.base_url"       "$(CFG_OLLAMA_URL)"; \
	  printf "  %-30s = %s\n" "ollama.model"          "$(CFG_OLLAMA_MODEL)"; \
	  printf "  $(BLUE)# JWT（basic）$(NC)\n"; \
	  printf "  %-30s = %s\n" "jwt.expire"            "$(CFG_JWT_EXPIRE_B)"; \
	  printf "  %-30s = %s\n" "jwt.issuer"            "$(CFG_JWT_ISSUER)"; \
	  printf "\n"; \
	fi; \
	if [ "$$only_priv" = "1" ]; then \
	  printf "$(BOLD)[$(CFG_PRIVATE)]$(NC)\n"; \
	  printf "  $(BLUE)# 数据库$(NC)\n"; \
	  printf "  %-30s = %s\n" "database.host"         "$(CFG_DB_HOST)"; \
	  printf "  %-30s = %s\n" "database.port"         "$(CFG_DB_PORT)"; \
	  printf "  %-30s = %s\n" "database.user"         "$(CFG_DB_USER)"; \
	  printf "  %-30s = %s\n" "database.password"     "$(CFG_DB_PASSWORD)"; \
	  printf "  %-30s = %s\n" "database.dbname"       "$(CFG_DB_NAME)"; \
	  printf "  %-30s = %s\n" "database.sslmode"      "$(CFG_DB_SSLMODE)"; \
	  printf "  $(BLUE)# Redis$(NC)\n"; \
	  printf "  %-30s = %s\n" "redis.host"            "$(CFG_REDIS_HOST)"; \
	  printf "  %-30s = %s\n" "redis.port"            "$(CFG_REDIS_PORT)"; \
	  printf "  $(BLUE)# 邮件$(NC)\n"; \
	  printf "  %-30s = %s\n" "email.host"            "$(CFG_EMAIL_HOST)"; \
	  printf "  %-30s = %s\n" "email.port"            "$(CFG_EMAIL_PORT)"; \
	  printf "  %-30s = %s\n" "email.username"        "$(CFG_EMAIL_USER)"; \
	  printf "  %-30s = %s\n" "email.from"            "$(CFG_EMAIL_FROM)"; \
	  printf "  $(BLUE)# JWT（private）$(NC)\n"; \
	  printf "  %-30s = %s\n" "jwt.secret"            "$(CFG_JWT_SECRET)"; \
	  printf "  %-30s = %s\n" "jwt.expire"            "$(CFG_JWT_EXPIRE)"; \
	  printf "  $(BLUE)# 管理员$(NC)\n"; \
	  printf "  %-30s = %s\n" "admin.email"           "$(CFG_ADMIN_EMAIL)"; \
	  printf "  %-30s = %s\n" "admin.username"        "$(CFG_ADMIN_USER)"; \
	  printf "  $(BLUE)# 服务器（private 覆盖）$(NC)\n"; \
	  printf "  %-30s = %s\n" "server.port"           "$(CFG_SERVER_PORT_P)"; \
	  printf "  %-30s = %s\n" "server.mode"           "$(CFG_SERVER_MODE_P)"; \
	  printf "\n"; \
	fi

# @检查所有配置文件是否存在
cfg-check:
	@printf "$(BOLD)[cfg] 检查配置文件...$(NC)\n"
	@failed=0; \
	for f in "$(CFG_BASIC)" "$(CFG_PRIVATE)" "$(CFG_RISK)" "$(CFG_POSTGRES)" "$(CFG_REDIS)"; do \
	  if [ -f "$$f" ]; then \
	    printf "  $(GREEN)✓ $$f$(NC)\n"; \
	  else \
	    printf "  $(RED)✗ $$f  （缺失）$(NC)\n"; \
	    failed=1; \
	  fi; \
	done; \
	printf "\n$(BOLD)[cfg] 解析工具...$(NC)\n"; \
	printf "  $(_CFG_PARSER)\n"; \
	printf "\n"; \
	if [ $$failed -eq 1 ]; then \
	  printf "$(RED)[cfg] ❌ 配置文件检查失败，请创建缺失的文件$(NC)\n"; \
	  exit 1; \
	else \
	  printf "$(GREEN)[cfg] ✅ 所有配置文件均存在$(NC)\n"; \
	fi

# @校验关键配置项格式
cfg-validate:
	@printf "$(BOLD)[cfg] 校验配置项格式...$(NC)\n"
	@if [ -z "$(_CFG_YQ)" ] && [ "$(_CFG_PY_READY)" != "yes" ]; then \
	  printf "$(RED)[cfg] ❌ 无解析工具，跳过校验$(NC)\n"; exit 1; \
	fi
	@failed=0; \
	_ok()   { printf "  $(GREEN)✓ %-35s = %s$(NC)\n" "$$1" "$$2"; }; \
	_fail() { printf "  $(RED)✗ %-35s = %s  (%s)$(NC)\n" "$$1" "$$2" "$$3"; failed=1; }; \
	_warn() { printf "  $(YELLOW)! %-35s = %s  (%s)$(NC)\n" "$$1" "$$2" "$$3"; }; \
	\
	port="$(CFG_SERVER_PORT)"; \
	if echo "$$port" | grep -qE '^[0-9]+$$' && [ "$$port" -ge 1 ] && [ "$$port" -le 65535 ]; then \
	  _ok "basic → server.port" "$$port"; \
	else _fail "basic → server.port" "$$port" "应为 1–65535"; fi; \
	\
	mode="$(CFG_SERVER_MODE)"; \
	if echo "$$mode" | grep -qE '^(debug|release|test)$$'; then \
	  _ok "basic → server.mode" "$$mode"; \
	else _fail "basic → server.mode" "$$mode" "应为 debug/release/test"; fi; \
	\
	lvl="$(CFG_LOG_LEVEL)"; \
	if echo "$$lvl" | grep -qE '^(debug|info|warn|error)$$'; then \
	  _ok "basic → log.level" "$$lvl"; \
	else _fail "basic → log.level" "$$lvl" "应为 debug/info/warn/error"; fi; \
	\
	dbport="$(CFG_DB_PORT)"; \
	if echo "$$dbport" | grep -qE '^[0-9]+$$' && [ "$$dbport" -ge 1 ] && [ "$$dbport" -le 65535 ]; then \
	  _ok "private → database.port" "$$dbport"; \
	else _fail "private → database.port" "$$dbport" "应为 1–65535"; fi; \
	\
	secret="$(CFG_JWT_SECRET)"; \
	slen=$${#secret}; \
	if [ "$$slen" -ge 32 ]; then \
	  _ok "private → jwt.secret (len=$$slen)" "***"; \
	else _fail "private → jwt.secret" "len=$$slen" "长度应 ≥ 32"; fi; \
	\
	expire="$(CFG_JWT_EXPIRE)"; \
	if echo "$$expire" | grep -qE '^[0-9]+(h|m|s)$$'; then \
	  _ok "private → jwt.expire" "$$expire"; \
	else _warn "private → jwt.expire" "$$expire" "建议格式如 24h / 30m"; fi; \
	\
	if [ "$$failed" = "1" ]; then \
	  printf "\n$(RED)[cfg] ❌ 校验失败，请修正配置文件$(NC)\n"; exit 1; \
	else \
	  printf "\n$(GREEN)[cfg] ✅ 校验通过$(NC)\n"; \
	fi

# @读取单个配置项
cfg-get:
	@if [ -z "$(FILE)" ] || [ -z "$(KEY)" ]; then \
	  printf "$(RED)[cfg] 用法: make cfg-get FILE=basic|private|risk|postgres|redis KEY=dotted.key$(NC)\n"; \
	  exit 1; \
	fi
	@case "$(FILE)" in \
	  basic)    f="$(CFG_BASIC)"    ;; \
	  private)  f="$(CFG_PRIVATE)"  ;; \
	  risk)     f="$(CFG_RISK)"     ;; \
	  postgres) f="$(CFG_POSTGRES)" ;; \
	  redis)    f="$(CFG_REDIS)"    ;; \
	  *) \
	    printf "$(RED)[cfg] FILE 参数错误: 应为 basic / private / risk / postgres / redis$(NC)\n"; \
	    exit 1 ;; \
	esac; \
	if [ ! -f "$$f" ]; then \
	  printf "$(RED)[cfg] 文件不存在: $$f$(NC)\n"; \
	  exit 1; \
	fi; \
	if [ -z "$(_CFG_YQ)" ] && [ "$(_CFG_PY_READY)" != "yes" ]; then \
	  printf "$(RED)[cfg] 缺少解析工具，请安装 yq 或 python3 + PyYAML$(NC)\n"; \
	  exit 1; \
	fi; \
	val=""; \
	if [ -n "$(_CFG_YQ)" ]; then \
	  val=$$($(_CFG_YQ) eval ".$(KEY)" "$$f" 2>/dev/null); \
	else \
	  val=$$($(_CFG_PYTHON3) $(_CFG_PY_SCRIPT) "$$f" "$(KEY)" 2>/dev/null); \
	fi; \
	if [ -z "$$val" ]; then \
	  printf "$(YELLOW)[cfg] '$(KEY)' 在 $$f 中不存在或值为空$(NC)\n"; \
	  exit 1; \
	else \
	  printf "$(GREEN)$(KEY)=$$val$(NC)\n"; \
	fi

# @显示版本信息
version:
	@$(MAKE) -s cfg-get FILE=basic KEY=version


# 帮助信息
.PHONY: cfg-help
# @此帮助信息
cfg-help:
	@$(MAKE) -s _print_help SELF_MAKEFILE_PATH='$(MAKEFILE_CFG_PATH)'
	@echo ""
