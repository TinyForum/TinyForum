# 开发环境覆盖配置
# 用法: docker compose -f docker-compose.yml -f docker-compose.override.yml up
#       podman-compose -f docker-compose.yml -f docker-compose.override.yml up

name: tiny-forum

services:
  postgres:
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev       # 如有热重载版 Dockerfile，指向它
      target: builder                   # 否则删除此行，用默认 target
    environment:
      SERVER_MODE: debug
      GIN_MODE: debug
    volumes:
      - ./backend:/app                  # 挂载源码，配合 air 等工具热重载
      - /app/bin                        # 排除二进制目录

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps                      # 只安装依赖，不构建
    command: ["npm", "run", "dev"]
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules               # 避免主机 node_modules 覆盖容器内的
    ports:
      - "3000:3000"

  nginx:
    ports:
      - "80:80"