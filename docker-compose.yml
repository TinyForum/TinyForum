name: tiny-forum

services:
  postgres:
    image: postgres:16-alpine
    container_name: tiny-forum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-caoyang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chang2002}
      POSTGRES_DB: ${DB_NAME:-tiny_forum}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-caoyang} -d ${DB_NAME:-tiny_forum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiny-forum-net

  redis:
    image: redis:7-alpine
    container_name: tiny-forum-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiny-forum-net

  backend:
    image: tiny-forum-backend:latest
    container_name: tiny-forum-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVER_MODE: ${SERVER_MODE:-release}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-caoyang}
      DB_PASSWORD: ${DB_PASSWORD:-chang2002}
      DB_NAME: ${DB_NAME:-tiny_forum}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-tiny-forum-secret-change-in-production-32chars}
      TZ: Asia/Shanghai
    volumes:
      - ./backend/configs:/app/configs:ro
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tiny-forum-net

  frontend:
    image: tiny-forum-frontend:latest
    container_name: tiny-forum-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      BACKEND_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tiny-forum-net

  nginx:
    image: nginx:alpine
    container_name: tiny-forum-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      # TLS 证书（可选）
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tiny-forum-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  nginx_logs:
    driver: local

networks:
  tiny-forum-net:
    driver: bridge