name: tiny-forum

services:
  postgres:
    image: postgres:16-alpine
    container_name: tiny-forum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-tiny_forum}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-54321}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tiny_forum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiny-forum-net

  redis:
    image: redis:7-alpine
    container_name: tiny-forum-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-63791}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiny-forum-net

  backend:
    image: tiny-forum-backend:latest
    container_name: tiny-forum-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PRIVATE_DATABASE_HOST: postgres
      PRIVATE_DATABASE_PORT: 5432
      PRIVATE_DATABASE_USER: ${DB_USER:-postgres}
      PRIVATE_DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      PRIVATE_DATABASE_DBNAME: ${DB_NAME:-tiny_forum}
      PRIVATE_REDIS_HOST: redis
      PRIVATE_REDIS_PORT: 6379
      PRIVATE_JWT_SECRET: ${JWT_SECRET:-tiny-forum-secret-change-in-production-32chars}
      TZ: Asia/Shanghai
    volumes:
      - ./backend/config/basic.compose.yaml:/app/config/basic.yaml:ro
      - ./backend/config/private.compose.yaml:/app/config/private.yaml:ro
      - ./backend/dicts:/app/dicts:ro
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health 2>/dev/null || wget -qO- http://localhost:8080/ 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tiny-forum-net

  frontend:
    image: tiny-forum-frontend:latest
    container_name: tiny-forum-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      BACKEND_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tiny-forum-net

  nginx:
    image: nginx:alpine
    container_name: tiny-forum-nginx
    restart: unless-stopped
    ports:
      # rootless Podman 不能绑定 <1024 特权端口
      # .env 中设置 HTTP_PORT=8080 HTTPS_PORT=8443
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      # TLS 证书（可选）
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tiny-forum-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  nginx_logs:
    driver: local

networks:
  tiny-forum-net:
    driver: bridge