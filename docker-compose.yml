version: '3.9'

# 定义自定义网络，便于服务间通信
networks:
  bbs-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: bbs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-tiny_forum}
      PGDATA: /var/lib/postgresql/data/pgdata
      # PostgreSQL 性能调优（可选）
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 初始化脚本（可选）
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - bbs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tiny_forum}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Redis（会话缓存，可选但推荐）
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bbs_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - bbs-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Backend (Go)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - GO_VERSION=${GO_VERSION:-1.21}
        - APP_ENV=${APP_ENV:-production}
    container_name: bbs_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-tiny_forum}
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      # 应用配置
      - APP_ENV=${APP_ENV:-production}
      - APP_PORT=8080
      - APP_SECRET=${APP_SECRET:-change_me_in_production}
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-change_jwt_secret}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      # 日志级别
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      # 配置文件（只读）
      - ./backend/config:/app/config:ro
      # 日志目录
      - backend_logs:/app/logs
      # 上传文件目录
      - uploads:/app/uploads
    networks:
      - bbs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    # 优雅关闭
    stop_grace_period: 30s

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=${NODE_VERSION:-20}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    container_name: bbs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - bbs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Nginx (反向代理，生产环境推荐)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: bbs_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书（可选）
      - nginx_logs:/var/log/nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - bbs-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 数据库管理工具 (Adminer/phpPgAdmin，可选)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: bbs_adminer
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    networks:
      - bbs-network
    profiles:
      - tools  # 使用 profile，默认不启动
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# 数据卷定义
# ============================================
volumes:
  pgdata:
    name: bbs_pgdata
    driver: local
  redis_data:
    name: bbs_redis_data
  backend_logs:
    name: bbs_backend_logs
  uploads:
    name: bbs_uploads
  nginx_logs:
    name: bbs_nginx_logs