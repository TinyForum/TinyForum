# ──────────────────────────────────────────
# Table: announcements
# ──────────────────────────────────────────
announcements:
  # 主键（跳过，由数据库自增）
  id:
    type: skip

  # 创建时间（非空）
  created_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 更新时间（非空）
  updated_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 软删除时间（绝大多数为 NULL）
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2024-12-31
    null_rate: 0.95

  # 标题（短标签）
  title:
    type: label

  # 内容（散文段落）
  content:
    type: text
    max_len: 500

  # 摘要（可选，15% NULL）
  summary:
    type: text
    max_len: 500
    null_rate: 0.15

  # 封面图（随机 URL，15% NULL）
  cover:
    type: url
    null_rate: 0.15

  # 公告类型（枚举，非空）
  type:
    type: enum
    values: ["normal", "important", "emergency", "event"]
    null_rate: 0.0

  # 公告状态（枚举，非空）
  status:
    type: enum
    values: ["draft", "published", "archived"]
    null_rate: 0.0

  # 是否置顶（非空）
  is_pinned:
    type: bool
    null_rate: 0.0

  # 是否全局（非空）
  is_global:
    type: bool
    null_rate: 0.0

  # 板块ID（外键，20% NULL）
  board_id:
    type: int
    min: 1
    max: 1000
    null_rate: 0.2

  # 发布时间（30% NULL）
  published_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.3

  # 过期时间（60% NULL）
  expired_at:
    type: timestamp_tz
    date_from: 2025-01-01
    date_to: 2026-12-31
    null_rate: 0.6

  # 浏览次数（非空）
  view_count:
    type: int
    min: 0
    max: 10000
    null_rate: 0.0

  # 创建人ID（非空外键）
  created_by:
    type: int
    min: 1
    max: 10000
    null_rate: 0.0

  # 更新人ID（非空，可与创建人不同）
  updated_by:
    type: int
    min: 1
    max: 10000
    null_rate: 0.0
# ──────────────────────────────────────────
# Table: answer_votes
# ──────────────────────────────────────────
answer_votes:
  # 从 INSERT 语句中排除此列
  id:
    type: skip

  # 创建时间（非空）
  created_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 更新时间（非空）
  updated_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 软删除时间（绝大多数为 NULL）
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2024-12-31
    null_rate: 0.95

  # 用户ID（外键）
  user_id:
    type: int
    min: 1
    max: 100000
    null_rate: 0.0

  # 评论ID（外键）
  comment_id:
    type: int
    min: 1
    max: 100000
    null_rate: 0.0

  # 投票类型（枚举：支持/反对，可空）
  vote_type:
    type: enum
    values: ["up", "down"]
    null_rate: 0.15

# ──────────────────────────────────────────
# Table: attachments
# ──────────────────────────────────────────
attachments:
  # 自增主键，跳过
  id:
    type: skip

  # 创建时间（非空）
  created_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 更新时间（非空）
  updated_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 软删除时间（绝大多数为 NULL）
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2024-12-31
    null_rate: 0.95

  # 文件唯一标识（UUID）
  file_id:
    type: uuid
    null_rate: 0.0

  # 用户ID（外键，非空）
  user_id:
    type: int
    min: 1
    max: 10000
    null_rate: 0.0

  # 插件ID（可选，20% NULL）
  plugin_id:
    type: string
    min_len: 8
    max_len: 32
    null_rate: 0.2

  # 帖子ID（可选，40% NULL）
  post_id:
    type: int
    min: 1
    max: 200000
    null_rate: 0.4

  # 回复ID（可选，60% NULL）
  reply_id:
    type: int
    min: 1
    max: 500000
    null_rate: 0.6

  # 原始文件名（随机字符串 + 扩展名样式）
  original_name:
    type: string
    min_len: 8
    max_len: 30

  # 存储文件名（使用 UUID 模拟唯一名）
  stored_name:
    type: uuid

  # 存储相对路径（模拟目录结构）
  stored_path:
    type: string
    min_len: 20
    max_len: 64

  # 文件大小（1KB ~ 20MB）
  size:
    type: int
    min: 1024
    max: 20971520
    null_rate: 0.0

  # 附件业务类型（枚举，非空）
  file_type:
    type: enum
    values: ["avatar", "post_image", "post_file", "comment_image", "plugin"]
    null_rate: 0.0

  # 完整 MIME 类型（常用值）
  mime_type:
    type: enum
    values:
      - "image/jpeg"
      - "image/png"
      - "image/webp"
      - "image/gif"
      - "video/mp4"
      - "audio/mpeg"
      - "application/pdf"
      - "application/zip"
      - "text/plain"
    null_rate: 0.0

  # 媒体大类（枚举，非空）
  mime_major:
    type: enum
    values: ["image", "video", "audio", "document", "archive", "other"]
    null_rate: 0.0

  # 文件扩展名（不含点，预置常见）
  ext:
    type: enum
    values:
      [
        "jpg",
        "png",
        "gif",
        "webp",
        "mp4",
        "mp3",
        "pdf",
        "zip",
        "txt",
        "go",
        "rs",
      ]
    null_rate: 0.05

  # 图片宽度（仅图片有效，60% NULL）
  width:
    type: int
    min: 0
    max: 4000
    null_rate: 0.6

  # 图片高度
  height:
    type: int
    min: 0
    max: 4000
    null_rate: 0.6

  # 状态（枚举，非空）
  status:
    type: enum
    values: ["temp", "normal", "deleted"]
    null_rate: 0.0

  # 上传 IP
  upload_ip:
    type: ip
    null_rate: 0.0

  # 插件附加元数据（随机 JSON，30% NULL）
  plugin_meta:
    type: json
    null_rate: 0.3

  # 文件哈希（可选，20% NULL）
  file_hash:
    type: string
    min_len: 64
    max_len: 64
    null_rate: 0.2

# ──────────────────────────────────────────
# Table: audit_logs
# ──────────────────────────────────────────

audit_logs:
  # 主键跳过
  id:
    type: skip

  # 创建时间（非空）
  created_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 更新时间（非空）
  updated_at:
    type: timestamp_tz
    date_from: 2023-01-01
    date_to: 2026-12-31
    null_rate: 0.0

  # 软删除时间（绝大多数为 NULL）
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2024-12-31
    null_rate: 0.95

  # 操作者ID（外键）
  operator_id:
    type: int
    min: 1
    max: 100000
    null_rate: 0.0

  # 操作者IP
  operator_ip:
    type: ip
    null_rate: 0.0

  # 操作类型（枚举，非空）
  action:
    type: enum
    values:
      - "block_user"
      - "unblock_user"
      - "hide_post"
      - "hide_comment"
      - "handle_report"
      - "approve_content"
      - "reject_content"
      - "deduct_score"
      - "set_risk_level"
    null_rate: 0.0

  # 目标类型（枚举，非空）
  target_type:
    type: enum
    values: ["post", "comment", "user", "report"]
    null_rate: 0.0

  # 目标ID（外键）
  target_id:
    type: int
    min: 1
    max: 500000
    null_rate: 0.0

  # 操作前数据（JSON，40% NULL）
  before:
    type: json
    null_rate: 0.4

  # 操作后数据（JSON，40% NULL）
  after:
    type: json
    null_rate: 0.4

  # 操作理由（文本，30% NULL）
  reason:
    type: text
    max_len: 200
    null_rate: 0.3

# ──────────────────────────────────────────
# Table: blocked_ips
# ──────────────────────────────────────────
blocked_ips:
  # ===== 基础字段 =====
  id:
    type: skip # 数据库自增主键，INSERT 时跳过

  # ===== 时间戳（GORM 自动管理，非空）=====
  created_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0 # 创建时间不应为 NULL
  updated_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0 # 更新时间不应为 NULL
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.15 # 软删除标记，15% 概率为 NULL（未删除）

  # ===== 业务字段 =====
  ip:
    type: ip # 生成 IPv4 地址（符合 varchar(45)）
    # 如需 IPv6 可改为 type: string + pattern 或自定义

  reason:
    type: label # 生成简短标签（如 "Spam", "Attack"）
    null_rate: 0.15 # 15% 概率为 NULL（无原因）

  operator_id:
    type: int
    min: 1 # uint 类型，最小值为 1
    max: 100000 # 合理范围，避免天文数字
    null_rate: 0.15 # 允许操作员未知

  expire_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.15 # NULL 表示永久封禁
# ──────────────────────────────────────────
# Table: board_bans
# ──────────────────────────────────────────
board_bans:
  id:
    type: skip # 数据库自增主键

  # 时间戳：BaseModel 中非 NULL
  created_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0 # 非空字段，禁止 NULL
  updated_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0 # 非空字段，禁止 NULL
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.15 # 软删除标记，允许 NULL

  # 外键字段（NOT NULL，需在有效范围内）
  user_id:
    type: int
    min: 1
    max: 100000 # 假定用户表 ID 范围
    null_rate: 0.0
    # 注意：与 board_id 的组合唯一索引可能冲突，如遇插入失败需重试或调整生成策略
  board_id:
    type: int
    min: 1
    max: 5000 # 假定板块表 ID 范围
    null_rate: 0.0
  banned_by:
    type: int
    min: 1
    max: 100000
    null_rate: 0.0

  reason:
    type: label # 生成简短原因（如 "Spam", "Off-topic"）
    null_rate: 0.15

  expires_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.15 # NULL 表示永久封禁
# ──────────────────────────────────────────
# Table: boards
# ──────────────────────────────────────────
boards:
  id:
    type: skip # 自增主键，跳过插入

  # ===== 时间戳（BaseModel 非空字段）=====
  created_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0 # 禁止 NULL
  updated_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.15 # 软删除标记，允许 NULL

  # ===== 唯一标识字段（注意唯一性风险）=====
  name:
    type: label # 生成类似 "TechNews" 的名称，不保证唯一
    # 若需严格唯一，可改用 type: unique（输出 "Label123" 格式）
  slug:
    type: slug # 生成类似 "tech-news" 的 slug，不保证唯一
    # 同上，改用 unique 会破坏格式，请接受低概率冲突

  # ===== 可选描述字段 =====
  description:
    type: text
    max_len: 500
    null_rate: 0.15
  icon:
    type: string
    min_len: 4
    max_len: 100
    null_rate: 0.15
  cover:
    type: string
    min_len: 4
    max_len: 500
    null_rate: 0.15

  # ===== 层级关系（简化，始终为 NULL）=====
  parent_id:
    type: null

  # ===== 排序与计数（非空整数）=====
  sort_order:
    type: int
    min: 0
    max: 1000 # 排序范围 0~1000
    null_rate: 0.0
  post_count:
    type: int
    min: 0
    max: 100000
    null_rate: 0.0
  thread_count:
    type: int
    min: 0
    max: 10000
    null_rate: 0.0
  today_count:
    type: int
    min: 0
    max: 1000
    null_rate: 0.0

  # ===== 角色权限（枚举）=====
  view_role:
    type: enum
    values: ["admin", "user", "guest"] # 根据实际 UserRole 定义调整
    null_rate: 0.0
  post_role:
    type: enum
    values: ["admin", "user", "guest"]
    null_rate: 0.0
  reply_role:
    type: enum
    values: ["admin", "user", "guest"]
    null_rate: 0.0
# ──────────────────────────────────────────
# Table: bots
# ──────────────────────────────────────────
bots:
  id:
    type: skip # 自增主键，跳过插入

  # ===== 时间戳（BaseModel 非空字段）=====
  created_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0 # 非空
  updated_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.0
  deleted_at:
    type: timestamp_tz
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.15 # 软删除标记

  # ===== 基本信息 =====
  name:
    type: label # 生成名称如 "WeatherBot"
    # 如有唯一性需求，可改为 type: unique（输出 "Label123"）
  version:
    type: semver # 生成语义版本如 "1.2.3"
  description:
    type: text
    max_len: 500
    null_rate: 0.15
  summary:
    type: text
    max_len: 300
    null_rate: 0.15
  avatar_url:
    type: url
    null_rate: 0.15
  homepage_url:
    type: url
    null_rate: 0.15

  # ===== 类型与标签 =====
  type: # BotType 枚举
    type: enum
    values:
      ["chat", "moderate", "notify", "sync", "task", "webhook", "analysis"]
    null_rate: 0.0
  tags: # 期望 JSON 字符串数组
    type: json
    null_rate: 0.15
    # 建议配置 json_schema 生成数组，例如：
    # json_schema:
    #   - name: items
    #     kind: string
    #     array_items: { kind: string }

  # ===== 创建者信息 =====
  creator_id:
    type: int
    min: 1
    max: 100000
    null_rate: 0.0
  creator_name:
    type: label
    null_rate: 0.15

  # ===== 脚本与触发 =====
  script_code:
    type: string
    min_len: 4
    max_len: 32
    null_rate: 0.15
  script_url:
    type: url
    null_rate: 0.15

  trigger_type: # BotTriggerType 枚举
    type: enum
    values: ["schedule", "event", "webhook", "manual"]
    null_rate: 0.0
  cron_expr:
    type: string
    min_len: 4
    max_len: 100
    null_rate: 0.15 # 实际可生成 "0 * * * *" 等，随机字符串不太像但可接受
  event_filter:
    type: string
    min_len: 4
    max_len: 200
    null_rate: 0.15

  # ===== 执行控制 =====
  timeout_sec:
    type: int
    min: 1
    max: 300 # 超时 1~300 秒
    null_rate: 0.0
  retry_times:
    type: int
    min: 0
    max: 10
    null_rate: 0.0
  env_vars: # 期望 JSON 对象（map）
    type: json
    null_rate: 0.15
  resource_limit: # 期望 JSON 对象（ResourceLimit）
    type: json
    null_rate: 0.15

  # ===== 定价与权限 =====
  pricing: # 期望 JSON 对象（BotPricing），非空
    type: json
    null_rate: 0.0 # 强制非空，生成随机 JSON 对象（可能不符合结构）
    # 建议配置 json_schema 生成合法定价结构
  permissions: # 期望 JSON 字符串数组（BotPermission）
    type: json
    null_rate: 0.15

  # ===== 状态与统计 =====
  enabled:
    type: bool
    null_rate: 0.0
  status: # BotStatus 枚举
    type: enum
    values: ["active", "inactive", "error", "loading", "stopped"]
    null_rate: 0.0
  exec_count:
    type: int
    min: 0
    max: 100000
    null_rate: 0.0
  last_exec_at:
    type: timestamp
    date_from: 2020-01-01
    date_to: 2026-12-31
    null_rate: 0.15
  error_msg:
    type: string
    min_len: 4
    max_len: 32
    null_rate: 0.15

  # ===== 配置相关 =====
  config_schema: # 期望 JSON 数组（[]BotConfigField）
    type: json
    null_rate: 0.15
  config_values: # 期望 JSON 对象（map）
    type: json
    null_rate: 0.15
